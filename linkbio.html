<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#151109" />
  <title>LINK BIO • FATURAMENTO</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --ouro: #d6a936;
      --ouro-claro: #f7dfa0;
      --ouro-vivo: #f2c14e;
      --ouro-escuro: #8f6512;
      --fundo: #0f0c07;
      --fundo-2: #19130a;
      --card: rgba(31, 24, 13, 0.94);
      --card-claro: rgba(255, 255, 255, 0.055);
      --texto: #fff8e8;
      --texto-suave: #cfbea0;
      --borda: rgba(242, 193, 78, 0.22);
      --borda-forte: rgba(242, 193, 78, 0.72);
      --verde: #72d89b;
      --vermelho: #ff8b8b;
      --sombra: 0 18px 55px rgba(0, 0, 0, 0.42);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      font-family: Inter, Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top right, rgba(214, 169, 54, 0.12), transparent 34%),
        linear-gradient(180deg, #171108 0%, var(--fundo) 55%, #090704 100%);
      color: var(--texto);
      overflow-x: hidden;
    }

    body {
      min-height: 100dvh;
    }

    button,
    select {
      font: inherit;
    }

    .app {
      width: 100%;
      max-width: 1100px;
      min-height: 100dvh;
      margin: 0 auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 9px;
    }

    .topo {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--borda-forte);
      border-radius: 20px;
      padding: 14px;
      background:
        linear-gradient(135deg, rgba(242, 193, 78, 0.24), rgba(70, 49, 14, 0.11)),
        rgba(24, 18, 9, 0.96);
      box-shadow: var(--sombra);
    }

    .topo::before {
      content: "";
      position: absolute;
      width: 190px;
      height: 190px;
      top: -115px;
      right: -60px;
      border-radius: 50%;
      background: rgba(242, 193, 78, 0.16);
      filter: blur(2px);
    }

    .topo-linha {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .marca {
      min-width: 0;
    }

    .selo {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 24px;
      padding: 0 9px;
      border-radius: 999px;
      background: rgba(242, 193, 78, 0.13);
      border: 1px solid rgba(242, 193, 78, 0.28);
      color: var(--ouro-claro);
      font-size: 9px;
      font-weight: 900;
      letter-spacing: 1.2px;
      text-transform: uppercase;
    }

    .selo::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--ouro-vivo);
      box-shadow: 0 0 12px rgba(242, 193, 78, 0.9);
    }

    .topo h1 {
      margin: 8px 0 2px;
      font-size: clamp(22px, 5.5vw, 34px);
      line-height: 1;
      letter-spacing: -1px;
    }

    .topo p {
      margin: 0;
      color: var(--texto-suave);
      font-size: 11px;
    }

    .preco-plano {
      position: relative;
      z-index: 1;
      flex: 0 0 auto;
      text-align: right;
    }

    .preco-plano small {
      display: block;
      color: var(--texto-suave);
      font-size: 9px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .preco-plano strong {
      display: block;
      margin-top: 2px;
      color: var(--ouro-claro);
      font-size: clamp(22px, 6vw, 34px);
      line-height: 1;
      letter-spacing: -1px;
      white-space: nowrap;
    }

    .preco-plano span {
      display: block;
      margin-top: 3px;
      color: var(--texto-suave);
      font-size: 9px;
      font-weight: 700;
    }

    .resumo {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 7px;
      margin-top: 11px;
    }

    .resumo-card {
      min-width: 0;
      padding: 9px;
      border: 1px solid var(--borda);
      border-radius: 13px;
      background: rgba(255, 255, 255, 0.045);
    }

    .resumo-card span {
      display: block;
      overflow: hidden;
      color: var(--texto-suave);
      font-size: 8px;
      font-weight: 900;
      letter-spacing: 0.65px;
      text-overflow: ellipsis;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .resumo-card strong {
      display: block;
      overflow: hidden;
      margin-top: 4px;
      color: var(--ouro-claro);
      font-size: clamp(14px, 4vw, 22px);
      line-height: 1.1;
      letter-spacing: -0.5px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .painel {
      flex: 1;
      min-height: 0;
      padding: 9px;
      border: 1px solid var(--borda);
      border-radius: 20px;
      background: rgba(20, 15, 8, 0.9);
      box-shadow: var(--sombra);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .filtros {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 7px;
    }

    select,
    button {
      height: 38px;
      border-radius: 12px;
      outline: none;
      font-size: 12px;
      font-weight: 900;
    }

    select {
      width: 100%;
      border: 1px solid var(--borda);
      background: #1c160c;
      color: var(--texto);
      padding: 0 11px;
      cursor: pointer;
    }

    button {
      min-width: 98px;
      border: 1px solid rgba(255, 224, 143, 0.45);
      color: #241701;
      padding: 0 13px;
      cursor: pointer;
      background: linear-gradient(135deg, #f5d57c, #c99524);
      box-shadow: 0 8px 22px rgba(214, 169, 54, 0.2);
      transition: transform 0.18s ease, filter 0.18s ease;
    }

    button:active {
      transform: scale(0.97);
    }

    button:hover {
      filter: brightness(1.06);
    }

    .calendario {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      grid-template-rows: repeat(4, minmax(74px, 1fr));
      gap: 6px;
    }

    .mes {
      position: relative;
      min-width: 0;
      min-height: 74px;
      overflow: hidden;
      padding: 8px;
      border: 1px solid var(--borda);
      border-radius: 13px;
      background: var(--card-claro);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: transform 0.18s ease, border-color 0.18s ease;
    }

    .mes:hover {
      transform: translateY(-2px);
      border-color: rgba(242, 193, 78, 0.5);
    }

    .mes.atual {
      border-color: var(--ouro-vivo);
      background:
        linear-gradient(145deg, rgba(242, 193, 78, 0.18), rgba(255, 255, 255, 0.04));
      box-shadow: inset 0 0 0 1px rgba(242, 193, 78, 0.12);
    }

    .mes.futuro {
      opacity: 0.42;
    }

    .mes.sem-valor:not(.futuro) {
      opacity: 0.66;
    }

    .mes-topo {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 5px;
      min-width: 0;
    }

    .mes-nome {
      overflow: hidden;
      color: var(--texto);
      font-size: clamp(9px, 2.4vw, 12px);
      font-weight: 950;
      letter-spacing: -0.15px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      flex: 0 0 auto;
      border-radius: 50%;
      background: var(--ouro-vivo);
      box-shadow: 0 0 9px rgba(242, 193, 78, 0.8);
    }

    .mes-valor {
      overflow: hidden;
      margin-top: 5px;
      color: var(--ouro-claro);
      font-size: clamp(12px, 3.25vw, 19px);
      font-weight: 950;
      line-height: 1;
      letter-spacing: -0.7px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .mes-info {
      margin-top: 5px;
      color: var(--texto-suave);
      font-size: clamp(7px, 1.9vw, 9px);
      font-weight: 700;
      line-height: 1.15;
    }

    .rodape {
      color: var(--texto-suave);
      font-size: 9px;
      line-height: 1.3;
      text-align: center;
    }

    .erro {
      display: none;
      padding: 9px 11px;
      border: 1px solid rgba(255, 139, 139, 0.34);
      border-radius: 12px;
      background: rgba(110, 19, 19, 0.32);
      color: #ffd0d0;
      font-size: 11px;
      font-weight: 800;
    }

    .erro.ativo {
      display: block;
    }

    .loading {
      position: fixed;
      inset: 0;
      z-index: 999;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(9, 7, 4, 0.88);
      backdrop-filter: blur(8px);
    }

    .loading.ativo {
      display: flex;
    }

    .loading-box {
      min-width: 150px;
      padding: 18px;
      border: 1px solid var(--borda-forte);
      border-radius: 18px;
      background: #1c160c;
      color: var(--ouro-claro);
      text-align: center;
      box-shadow: var(--sombra);
      font-size: 12px;
      font-weight: 900;
    }

    .spinner {
      width: 27px;
      height: 27px;
      margin: 0 auto 10px;
      border: 3px solid rgba(242, 193, 78, 0.18);
      border-top-color: var(--ouro-vivo);
      border-radius: 50%;
      animation: girar 0.75s linear infinite;
    }

    @keyframes girar {
      to { transform: rotate(360deg); }
    }

    @media (min-width: 700px) {
      .app {
        padding: 16px;
        gap: 12px;
      }

      .topo {
        padding: 20px;
      }

      .painel {
        padding: 13px;
      }

      .calendario {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        grid-template-rows: repeat(3, minmax(105px, 1fr));
        gap: 9px;
      }

      .mes {
        padding: 12px;
        min-height: 105px;
      }
    }

    @media (max-height: 720px) and (max-width: 699px) {
      .app {
        padding: 6px;
        gap: 6px;
      }

      .topo {
        padding: 10px;
        border-radius: 16px;
      }

      .topo h1 {
        margin-top: 5px;
        font-size: 20px;
      }

      .topo p,
      .preco-plano span {
        display: none;
      }

      .resumo {
        margin-top: 7px;
      }

      .resumo-card {
        padding: 6px;
      }

      .resumo-card strong {
        margin-top: 2px;
        font-size: 13px;
      }

      .painel {
        padding: 6px;
        gap: 6px;
        border-radius: 16px;
      }

      select,
      button {
        height: 32px;
      }

      .calendario {
        gap: 4px;
        grid-template-rows: repeat(4, minmax(59px, 1fr));
      }

      .mes {
        min-height: 59px;
        padding: 6px;
        border-radius: 10px;
      }

      .mes-info {
        margin-top: 3px;
      }

      .rodape {
        display: none;
      }
    }
  </style>
</head>

<body>
  <div class="loading ativo" id="loading">
    <div class="loading-box">
      <div class="spinner"></div>
      Carregando faturamento...
    </div>
  </div>

  <main class="app">
    <header class="topo">
      <div class="topo-linha">
        <div class="marca">
          <div class="selo">Painel financeiro</div>
          <h1>LINK BIO</h1>
          <p>Faturamento mensal das lojas publicadas</p>
        </div>

        <div class="preco-plano">
          <small>Mensalidade</small>
          <strong>R$ 9,90</strong>
          <span>por loja / mês</span>
        </div>
      </div>

      <div class="resumo">
        <div class="resumo-card">
          <span>Total do ano</span>
          <strong id="totalAno">R$ 0,00</strong>
        </div>

        <div class="resumo-card">
          <span>Lojas ativas</span>
          <strong id="totalLojas">0</strong>
        </div>

        <div class="resumo-card">
          <span>Média mensal</span>
          <strong id="mediaMensal">R$ 0,00</strong>
        </div>
      </div>
    </header>

    <div class="erro" id="erroBox"></div>

    <section class="painel">
      <div class="filtros">
        <select id="anoSelect" aria-label="Selecionar ano"></select>
        <button type="button" onclick="carregarDados()">Atualizar</button>
      </div>

      <div class="calendario" id="calendario"></div>

      <div class="rodape">
        Cada loja válida gera R$ 9,90 por mês desde sua criação. Meses futuros não entram no total.
      </div>
    </section>
  </main>

  <script>
    const SUPABASE_URL = "https://egxjgmzukjyyxmkukwub.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_EWwdrLOUk6KDHZGLuh4uRg_QDRtLeFi";

    const supabaseClient = supabase.createClient(
      SUPABASE_URL,
      SUPABASE_ANON_KEY
    );

    const VALOR_MENSAL_POR_LOJA = 9.90;

    const meses = [
      "Janeiro", "Fevereiro", "Março", "Abril",
      "Maio", "Junho", "Julho", "Agosto",
      "Setembro", "Outubro", "Novembro", "Dezembro"
    ];

    let lojas = [];

    function moeda(valor) {
      return Number(valor || 0).toLocaleString("pt-BR", {
        style: "currency",
        currency: "BRL",
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });
    }

    function textoNormalizado(valor) {
      return String(valor ?? "")
        .trim()
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "");
    }

    function valorBooleanoAtivo(valor) {
      if (valor === true || valor === 1) return true;

      const texto = textoNormalizado(valor);

      return [
        "true", "1", "sim", "ativo", "ativa",
        "publicado", "publicada", "pago", "paga",
        "aprovado", "aprovada"
      ].includes(texto);
    }

    function statusValido(valor, palavrasValidas) {
      if (valor === null || valor === undefined || valor === "") {
        return true;
      }

      const texto = textoNormalizado(valor);
      return palavrasValidas.some(palavra => texto.includes(palavra));
    }

    function lojaValida(loja) {
      const ativoOk = valorBooleanoAtivo(loja.ativo);

      const statusOk = statusValido(loja.status, [
        "publicad", "ativ", "aprovad"
      ]);

      const pagamentoOk = statusValido(loja.pagamento_status, [
        "pag", "aprovad", "ativ"
      ]);

      return ativoOk && statusOk && pagamentoOk;
    }

    function dataCriacaoLoja(loja) {
      if (!loja?.criado_em) return null;

      const data = new Date(loja.criado_em);
      return Number.isNaN(data.getTime()) ? null : data;
    }

    function primeiroDiaDoMes(ano, mesIndex) {
      return new Date(ano, mesIndex, 1, 0, 0, 0, 0);
    }

    function ultimoDiaDoMes(ano, mesIndex) {
      return new Date(ano, mesIndex + 1, 0, 23, 59, 59, 999);
    }

    function mesJaPodeSerCobrado(ano, mesIndex) {
      const hoje = new Date();
      return primeiroDiaDoMes(ano, mesIndex) <= hoje;
    }

    function lojaCobradaNoMes(loja, ano, mesIndex) {
      if (!lojaValida(loja)) return false;
      if (!mesJaPodeSerCobrado(ano, mesIndex)) return false;

      const criado = dataCriacaoLoja(loja);
      if (!criado) return false;

      return criado <= ultimoDiaDoMes(ano, mesIndex);
    }

    function prepararAno() {
      const select = document.getElementById("anoSelect");
      const anoAtual = new Date().getFullYear();

      select.innerHTML = "";

      for (let ano = anoAtual - 4; ano <= anoAtual + 1; ano++) {
        const option = document.createElement("option");
        option.value = ano;
        option.textContent = ano;
        option.selected = ano === anoAtual;
        select.appendChild(option);
      }

      select.addEventListener("change", renderizarCalendario);
    }

    async function carregarDados() {
      loading(true);
      mostrarErro("");

      try {
        const { data, error } = await supabaseClient
          .from("bio_pages_publicadas")
          .select("id, nome, slug, criado_em, status, pagamento_status, ativo")
          .order("criado_em", { ascending: true });

        if (error) throw error;

        lojas = Array.isArray(data) ? data : [];
        renderizarCalendario();
      } catch (error) {
        console.error(error);
        lojas = [];
        renderizarCalendario();
        mostrarErro("Erro ao carregar os dados: " + (error?.message || "erro desconhecido"));
      } finally {
        loading(false);
      }
    }

    function renderizarCalendario() {
      const ano = Number(document.getElementById("anoSelect").value);
      const hoje = new Date();
      const calendario = document.getElementById("calendario");

      let totalAno = 0;
      let mesesComCobranca = 0;

      calendario.innerHTML = "";

      meses.forEach((nomeMes, mesIndex) => {
        const futuro = !mesJaPodeSerCobrado(ano, mesIndex);
        const qtdLojas = lojas.filter(loja =>
          lojaCobradaNoMes(loja, ano, mesIndex)
        ).length;

        const valorMes = qtdLojas * VALOR_MENSAL_POR_LOJA;

        if (!futuro) {
          totalAno += valorMes;
          mesesComCobranca += 1;
        }

        const card = document.createElement("article");
        card.className = "mes";

        if (ano === hoje.getFullYear() && mesIndex === hoje.getMonth()) {
          card.classList.add("atual");
        }

        if (futuro) {
          card.classList.add("futuro");
        }

        if (valorMes <= 0) {
          card.classList.add("sem-valor");
        }

        const descricao = futuro
          ? "Mês futuro"
          : `${qtdLojas} loja${qtdLojas === 1 ? "" : "s"}`;

        card.innerHTML = `
          <div>
            <div class="mes-topo">
              <div class="mes-nome">${nomeMes}</div>
              ${valorMes > 0 && !futuro ? '<span class="status-dot"></span>' : ""}
            </div>

            <div class="mes-valor">${moeda(valorMes)}</div>
          </div>

          <div class="mes-info">${descricao}</div>
        `;

        calendario.appendChild(card);
      });

      const lojasAtivas = lojas.filter(lojaValida).length;
      const media = mesesComCobranca > 0
        ? totalAno / mesesComCobranca
        : 0;

      document.getElementById("totalAno").textContent = moeda(totalAno);
      document.getElementById("totalLojas").textContent = lojasAtivas;
      document.getElementById("mediaMensal").textContent = moeda(media);
    }

    function loading(ativo) {
      document.getElementById("loading").classList.toggle("ativo", ativo);
    }

    function mostrarErro(mensagem) {
      const box = document.getElementById("erroBox");

      if (!mensagem) {
        box.textContent = "";
        box.classList.remove("ativo");
        return;
      }

      box.textContent = mensagem;
      box.classList.add("ativo");
    }

    prepararAno();
    carregarDados();
  </script>
</body>
</html>
