<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Admin • Agendamentos Global</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --bg:#f6f7fb;
  --card:#ffffff;
  --border:#e5e7eb;
  --text:#111827;
  --muted:#6b7280;
  --primary:#111827;
  --danger:#dc2626;
  --success:#16a34a;
  --radius:18px;
}

*{box-sizing:border-box;font-family:Inter}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
}

.header{
  background:#000;
  color:#fff;
  padding:24px;
  font-size:20px;
  font-weight:900;
  letter-spacing:.5px;
}

.container{
  max-width:1500px;
  margin:auto;
  padding:24px;
}

/* FILTROS */
.filters{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:14px;
  margin-bottom:24px;
}

input,select{
  padding:14px;
  border-radius:14px;
  border:1px solid var(--border);
  font-weight:600;
  font-size:14px;
  background:#fff;
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:18px;
  margin-bottom:28px;
}

.card{
  background:var(--card);
  padding:22px;
  border-radius:var(--radius);
  box-shadow:0 15px 40px rgba(0,0,0,.06);
}

.card h3{
  margin:0;
  font-size:12px;
  color:var(--muted);
  font-weight:700;
  text-transform:uppercase;
}

.card strong{
  font-size:26px;
  margin-top:8px;
  display:block;
}

/* TABELA */
.table-wrap{
  background:#fff;
  border-radius:20px;
  overflow:auto;
  box-shadow:0 15px 40px rgba(0,0,0,.06);
}

table{
  width:100%;
  border-collapse:collapse;
  min-width:1000px;
}

th,td{
  padding:16px;
  border-bottom:1px solid #f1f1f1;
  font-size:13px;
  text-align:left;
}

th{
  background:#fafafa;
  font-weight:800;
  position:sticky;
  top:0;
}

tr:hover{
  background:#f9fafb;
}

.status{
  padding:6px 12px;
  border-radius:999px;
  font-size:11px;
  font-weight:800;
}

.status.CONFIRMADO{background:#dcfce7;color:#166534}
.status.CANCELADO{background:#fee2e2;color:#991b1b}
.status.PENDENTE_PAGAMENTO{background:#fef3c7;color:#92400e}

/* AÇÕES */
.actions{
  margin-top:24px;
  display:flex;
  gap:16px;
}

button{
  padding:14px 22px;
  border:none;
  border-radius:14px;
  font-weight:800;
  cursor:pointer;
  font-size:14px;
}

.btn-danger{
  background:var(--danger);
  color:#fff;
}

.btn-danger:hover{
  opacity:.9;
}

.loading{
  text-align:center;
  padding:40px;
  color:var(--muted);
  font-weight:700;
}
</style>
</head>

<body>

<div class="header">
  Painel Administrativo Global
</div>

<div class="container">

<div class="filters">
  <input id="filtroCliente" placeholder="Filtrar por cliente">
  <input id="filtroLoja" placeholder="Filtrar por loja">
  <select id="filtroStatus">
    <option value="">Todos status</option>
    <option value="CONFIRMADO">Confirmado</option>
    <option value="CANCELADO">Cancelado</option>
    <option value="PENDENTE_PAGAMENTO">Pendente Pagamento</option>
  </select>
</div>

<div class="cards">
  <div class="card">
    <h3>Total de Agendamentos</h3>
    <strong id="totalAg">0</strong>
  </div>
  <div class="card">
    <h3>Faturamento Total</h3>
    <strong id="totalValor">R$ 0,00</strong>
  </div>
  <div class="card">
    <h3>Total de Lojas</h3>
    <strong id="totalLojas">0</strong>
  </div>
  <div class="card">
    <h3>Total de Clientes</h3>
    <strong id="totalClientes">0</strong>
  </div>
</div>

<div class="table-wrap">
<table>
<thead>
<tr>
<th><input type="checkbox" id="checkAll"></th>
<th>Data</th>
<th>Horário</th>
<th>Cliente</th>
<th>WhatsApp</th>
<th>Loja</th>
<th>Status</th>
<th>Valor</th>
</tr>
</thead>
<tbody id="tbody">
<tr><td colspan="8" class="loading">Carregando...</td></tr>
</tbody>
</table>
</div>

<div class="actions">
  <button class="btn-danger" onclick="excluirSelecionados()">
    Excluir Selecionados
  </button>
</div>

</div>

<script>
const sb = supabase.createClient(
  "https://egxjgmzukjyyxmkukwub.supabase.co",
  "sb_publishable_EWwdrLOUk6KDHZGLuh4uRg_QDRtLeFi"
);

let agendamentos = [];
let lojasMap = {};

/* ================= CARREGAR ================= */
async function carregar(){

  document.getElementById("tbody").innerHTML =
    `<tr><td colspan="8" class="loading">Carregando...</td></tr>`;

  const { data, error } = await sb
    .from("agendamentos")
    .select("*")
    .order("data",{ascending:false});

  if(error){
    document.getElementById("tbody").innerHTML =
      `<tr><td colspan="8" class="loading">Erro ao carregar</td></tr>`;
    console.error(error);
    return;
  }

  agendamentos = data || [];

  const lojasIds=[...new Set(agendamentos.map(a=>a.loja_id))];

  if(lojasIds.length){
    const { data:lojas } = await sb
      .from("user_profile")
      .select("user_id,negocio")
      .in("user_id",lojasIds);

    lojas?.forEach(l=>{
      lojasMap[l.user_id]=l.negocio;
    });
  }

  aplicarFiltros();
}

/* ================= FILTROS ================= */
function aplicarFiltros(){

  const fc=document.getElementById("filtroCliente").value.toLowerCase();
  const fl=document.getElementById("filtroLoja").value.toLowerCase();
  const fs=document.getElementById("filtroStatus").value;

  const lista = agendamentos.filter(a=>{
    const cliente=(a.cliente_nome||"").toLowerCase();
    const loja=(lojasMap[a.loja_id]||"").toLowerCase();

    return (!fc || cliente.includes(fc)) &&
           (!fl || loja.includes(fl)) &&
           (!fs || a.status===fs);
  });

  render(lista);
}

/* ================= RENDER ================= */
function render(lista){

  document.getElementById("totalAg").innerText = lista.length;

  const total = lista.reduce((s,x)=>s+Number(x.valor_total||0),0);

  document.getElementById("totalValor")
    .innerText = total.toLocaleString("pt-BR",{style:"currency",currency:"BRL"});

  document.getElementById("totalLojas")
    .innerText = new Set(lista.map(a=>a.loja_id)).size;

  document.getElementById("totalClientes")
    .innerText = new Set(lista.map(a=>a.cliente_whatsapp)).size;

  const tbody=document.getElementById("tbody");

  if(!lista.length){
    tbody.innerHTML =
      `<tr><td colspan="8" class="loading">Nenhum resultado encontrado</td></tr>`;
    return;
  }

  tbody.innerHTML = lista.map(a=>`
    <tr>
      <td><input type="checkbox" value="${a.id}"></td>
      <td>${a.data || ""}</td>
      <td>${a.hora_inicio || ""}</td>
      <td>${a.cliente_nome || ""}</td>
      <td>${a.cliente_whatsapp || ""}</td>
      <td>${lojasMap[a.loja_id] || a.loja_id}</td>
      <td><span class="status ${a.status}">${a.status}</span></td>
      <td>R$ ${Number(a.valor_total||0).toFixed(2)}</td>
    </tr>
  `).join("");
}

/* ================= EXCLUIR ================= */
async function excluirSelecionados(){

  const ids=[...document.querySelectorAll("tbody input:checked")]
    .map(i=>i.value);

  if(!ids.length){
    alert("Selecione ao menos um agendamento.");
    return;
  }

  if(!confirm("Tem certeza que deseja EXCLUIR permanentemente os registros selecionados?")){
    return;
  }

  const { error } = await sb
    .from("agendamentos")
    .delete()
    .in("id",ids);

  if(error){
    alert("Erro ao excluir.");
    console.error(error);
    return;
  }

  alert("Excluído com sucesso.");
  carregar();
}

/* EVENTOS */
document.getElementById("filtroCliente").addEventListener("input",aplicarFiltros);
document.getElementById("filtroLoja").addEventListener("input",aplicarFiltros);
document.getElementById("filtroStatus").addEventListener("change",aplicarFiltros);

document.getElementById("checkAll").addEventListener("change",e=>{
  document.querySelectorAll("tbody input").forEach(c=>c.checked=e.target.checked);
});

carregar();
</script>

</body>
</html>
