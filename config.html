<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Admin • Agendamentos Global</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --bg:#f4f6fb;
  --card:#ffffff;
  --border:#e5e7eb;
  --text:#111827;
  --muted:#6b7280;
  --primary:#111827;
  --danger:#dc2626;
  --radius:18px;
}
*{box-sizing:border-box;font-family:Inter}
body{margin:0;background:var(--bg);color:var(--text)}

.header{
  background:#000;
  color:#fff;
  padding:20px;
  font-size:18px;
  font-weight:900;
}

.container{
  max-width:1400px;
  margin:auto;
  padding:20px;
}

.filters{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:12px;
  margin-bottom:20px;
}

input,select{
  padding:12px;
  border-radius:12px;
  border:1px solid var(--border);
  font-weight:600;
}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:14px;
  margin-bottom:20px;
}

.card{
  background:var(--card);
  padding:18px;
  border-radius:var(--radius);
  box-shadow:0 10px 24px rgba(0,0,0,.08);
}

.card h3{
  margin:0;
  font-size:12px;
  color:var(--muted);
}

.card strong{
  font-size:22px;
}

.table-wrap{
  background:#fff;
  border-radius:18px;
  overflow:auto;
  box-shadow:0 10px 24px rgba(0,0,0,.08);
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:14px;
  border-bottom:1px solid #eee;
  font-size:13px;
}

th{
  background:#fafafa;
  font-weight:800;
}

.status{
  padding:6px 10px;
  border-radius:999px;
  font-size:11px;
  font-weight:800;
}

.status.CONFIRMADO{background:#dcfce7;color:#166534}
.status.CANCELADO{background:#fee2e2;color:#991b1b}
.status.PENDENTE_PAGAMENTO{background:#fef3c7;color:#92400e}

.actions{
  margin-top:20px;
  display:flex;
  gap:12px;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:12px;
  font-weight:800;
  cursor:pointer;
}

.btn-danger{
  background:var(--danger);
  color:#fff;
}
</style>
</head>
<body>

<div class="header">
  Painel Administrativo Global
</div>

<div class="container">

<div class="filters">
  <input id="filtroCliente" placeholder="Filtrar por cliente">
  <input id="filtroLoja" placeholder="Filtrar por loja">
  <select id="filtroStatus">
    <option value="">Todos status</option>
    <option value="CONFIRMADO">Confirmado</option>
    <option value="CANCELADO">Cancelado</option>
    <option value="PENDENTE_PAGAMENTO">Pendente Pagamento</option>
  </select>
</div>

<div class="cards">
  <div class="card">
    <h3>Total de Agendamentos</h3>
    <strong id="totalAg">0</strong>
  </div>
  <div class="card">
    <h3>Faturamento Total</h3>
    <strong id="totalValor">R$ 0,00</strong>
  </div>
  <div class="card">
    <h3>Total de Lojas</h3>
    <strong id="totalLojas">0</strong>
  </div>
  <div class="card">
    <h3>Total de Clientes</h3>
    <strong id="totalClientes">0</strong>
  </div>
</div>

<div class="table-wrap">
<table>
<thead>
<tr>
<th><input type="checkbox" id="checkAll"></th>
<th>Data</th>
<th>Horário</th>
<th>Cliente</th>
<th>WhatsApp</th>
<th>Loja</th>
<th>Status</th>
<th>Valor</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

<div class="actions">
  <button class="btn-danger" onclick="excluirSelecionados()">
    Excluir Selecionados
  </button>
</div>

</div>

<script>
const sb = supabase.createClient(
  "https://egxjgmzukjyyxmkukwub.supabase.co",
  "sb_publishable_EWwdrLOUk6KDHZGLuh4uRg_QDRtLeFi"
);

let agendamentos = [];
let lojasMap = {};

async function carregar(){

  const { data } = await sb
    .from("agendamentos")
    .select("*")
    .order("data",{ascending:false});

  agendamentos = data || [];

  const lojasIds=[...new Set(agendamentos.map(a=>a.loja_id))];

  if(lojasIds.length){
    const { data:lojas } = await sb
      .from("user_profile")
      .select("user_id,negocio")
      .in("user_id",lojasIds);

    lojas?.forEach(l=>{
      lojasMap[l.user_id]=l.negocio;
    });
  }

  aplicarFiltros();
}

function aplicarFiltros(){

  const fc=document.getElementById("filtroCliente").value.toLowerCase();
  const fl=document.getElementById("filtroLoja").value.toLowerCase();
  const fs=document.getElementById("filtroStatus").value;

  let lista = agendamentos.filter(a=>{

    const cliente=(a.cliente_nome||"").toLowerCase();
    const loja=(lojasMap[a.loja_id]||"").toLowerCase();

    return (!fc || cliente.includes(fc)) &&
           (!fl || loja.includes(fl)) &&
           (!fs || a.status===fs);
  });

  render(lista);
}

function render(lista){

  document.getElementById("totalAg").innerText = lista.length;

  const total = lista.reduce((s,x)=>s+Number(x.valor_total||0),0);
  document.getElementById("totalValor")
    .innerText = total.toLocaleString("pt-BR",{style:"currency",currency:"BRL"});

  document.getElementById("totalLojas")
    .innerText = new Set(lista.map(a=>a.loja_id)).size;

  document.getElementById("totalClientes")
    .innerText = new Set(lista.map(a=>a.cliente_whatsapp)).size;

  const tbody=document.getElementById("tbody");

  tbody.innerHTML = lista.map(a=>`
    <tr>
      <td><input type="checkbox" value="${a.id}"></td>
      <td>${a.data}</td>
      <td>${a.hora_inicio}</td>
      <td>${a.cliente_nome||""}</td>
      <td>${a.cliente_whatsapp||""}</td>
      <td>${lojasMap[a.loja_id]||a.loja_id}</td>
      <td><span class="status ${a.status}">${a.status}</span></td>
      <td>R$ ${Number(a.valor_total||0).toFixed(2)}</td>
    </tr>
  `).join("");
}

function excluirSelecionados(){
  const ids=[...document.querySelectorAll("tbody input:checked")]
    .map(i=>i.value);

  if(!ids.length) return alert("Selecione ao menos um");

  sb.from("agendamentos")
    .delete()
    .in("id",ids)
    .then(()=>carregar());
}

document.getElementById("filtroCliente").addEventListener("input",aplicarFiltros);
document.getElementById("filtroLoja").addEventListener("input",aplicarFiltros);
document.getElementById("filtroStatus").addEventListener("change",aplicarFiltros);

document.getElementById("checkAll").addEventListener("change",e=>{
  document.querySelectorAll("tbody input").forEach(c=>c.checked=e.target.checked);
});

carregar();
</script>

</body>
</html>
