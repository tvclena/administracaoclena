<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Admin • Agendamentos Global</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#2563eb">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --primary:#2563eb;
  --primary-dark:#1e40af;
  --bg:#f4f6fb;
  --card:#ffffff;
  --border:#eef2f7;
  --text:#0f172a;
  --muted:#64748b;
  --success:#16a34a;
  --danger:#dc2626;
  --warn:#f59e0b;
}

*{
  box-sizing:border-box;
  font-family:Inter,Arial,sans-serif;
  -webkit-tap-highlight-color:transparent;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

/* HEADER */
.header{
  min-height:64px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:14px 28px;
  background:#fff;
  border-bottom:0.5px solid var(--border);
}

.header h1{
  margin:0;
  font-size:20px;
  font-weight:900;
}

.header-right{
  display:flex;
  align-items:center;
  gap:12px;
  font-size:13px;
  color:var(--muted);
  font-weight:800;
}

/* BOTÕES */
.btn-primary{
  border:none;
  background:linear-gradient(180deg,var(--primary),var(--primary-dark));
  color:#fff;
  padding:11px 16px;
  border-radius:12px;
  font-weight:900;
  cursor:pointer;
  box-shadow:0 8px 18px rgba(37,99,235,.25);
}

.btn-light{
  border:0.5px solid var(--border);
  background:#fff;
  color:var(--text);
  padding:11px 16px;
  border-radius:12px;
  font-weight:900;
  cursor:pointer;
}

.btn-danger{
  border:none;
  background:var(--danger);
  color:#fff;
  padding:11px 16px;
  border-radius:12px;
  font-weight:900;
  cursor:pointer;
}

.btn-danger:disabled{
  opacity:.45;
  cursor:not-allowed;
}

/* KPIS */
.kpis{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:18px;
  padding:18px 28px;
  font-size:13px;
}

.kpis div{
  background:#fff;
  padding:16px 18px;
  border-radius:14px;
  border:0.5px solid var(--border);
}

.kpis small{
  display:block;
  color:var(--muted);
  font-weight:800;
  margin-bottom:6px;
}

.kpis span{
  font-weight:900;
  font-size:22px;
}

/* FILTROS */
.filters{
  display:grid;
  grid-template-columns:1fr 1fr 220px;
  gap:12px;
  padding:0 28px 18px;
}

.search,
.select{
  width:100%;
  border:0.5px solid var(--border);
  background:#fff;
  border-radius:14px;
  padding:13px 14px;
  font-size:14px;
  outline:none;
}

.search:focus,
.select:focus{
  border-color:var(--primary);
  box-shadow:0 0 0 3px rgba(37,99,235,.10);
}

/* AÇÕES TOPO */
.actions-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  padding:0 28px 18px;
}

.selected-info{
  font-size:13px;
  color:var(--muted);
  font-weight:800;
}

/* TABELA */
.table-card{
  margin:0 28px 28px;
  background:#fff;
  border-radius:16px;
  border:0.5px solid var(--border);
  overflow:hidden;
}

.table-wrap{
  width:100%;
  overflow:auto;
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:13px;
  min-width:1050px;
}

th{
  text-align:left;
  padding:14px;
  background:#fafafa;
  font-weight:900;
  border-bottom:0.5px solid var(--border);
  color:#334155;
  white-space:nowrap;
}

td{
  padding:14px;
  border-bottom:0.5px solid var(--border);
  vertical-align:middle;
}

tr:hover{
  background:#f8fafc;
}

.check{
  width:18px;
  height:18px;
  cursor:pointer;
}

.empty{
  padding:35px;
  text-align:center;
  color:var(--muted);
  font-weight:800;
}

.text-muted{
  color:var(--muted);
}

.cliente-box{
  min-width:190px;
}

.cliente-nome{
  font-weight:900;
  color:var(--text);
}

.cliente-sub{
  color:var(--muted);
  font-size:11px;
  font-weight:700;
  margin-top:3px;
}

.loja-nome{
  font-weight:900;
}

.badge{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:5px 12px;
  border-radius:999px;
  font-size:11px;
  font-weight:900;
  white-space:nowrap;
  text-transform:uppercase;
}

.badge.CONFIRMADO{
  background:#dcfce7;
  color:#166534;
}

.badge.CANCELADO{
  background:#fee2e2;
  color:#991b1b;
}

.badge.PENDENTE_PAGAMENTO{
  background:#fef3c7;
  color:#92400e;
}

.badge.OUTRO{
  background:#e0e7ff;
  color:#3730a3;
}

/* TOAST */
.toast{
  position:fixed;
  left:50%;
  bottom:28px;
  transform:translateX(-50%);
  background:#0f172a;
  color:#fff;
  padding:12px 18px;
  border-radius:999px;
  font-size:13px;
  font-weight:900;
  display:none;
  z-index:4000;
}

/* OVERLAY */
#overlay{
  position:fixed;
  inset:0;
  background:rgba(255,255,255,.75);
  backdrop-filter:blur(3px);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:3000;
}

.spinner{
  width:40px;
  height:40px;
  border:4px solid #e5e7eb;
  border-top-color:var(--primary);
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  to{
    transform:rotate(360deg);
  }
}

@media(max-width:900px){
  .kpis{
    grid-template-columns:repeat(2,1fr);
    padding:14px;
    gap:10px;
  }

  .filters{
    grid-template-columns:1fr;
    padding:0 14px 14px;
  }

  .actions-top{
    padding:0 14px 14px;
    align-items:stretch;
    flex-direction:column;
  }

  .table-card{
    margin:0 14px 28px;
  }
}

@media(max-width:700px){
  .header{
    padding:14px;
    align-items:flex-start;
    flex-direction:column;
  }

  .header-right{
    width:100%;
    justify-content:space-between;
  }

  .kpis{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<div class="header">
  <h1>Admin • Agendamentos Global</h1>

  <div class="header-right">
    <div id="totalReg">0 registros</div>
    <button class="btn-primary" onclick="carregar()">Atualizar</button>
  </div>
</div>

<div class="kpis">
  <div>
    <small>Total de Agendamentos</small>
    <span id="totalAg">0</span>
  </div>

  <div>
    <small>Faturamento Total</small>
    <span id="totalValor">R$ 0,00</span>
  </div>

  <div>
    <small>Total de Lojas</small>
    <span id="totalLojas">0</span>
  </div>

  <div>
    <small>Total de Clientes</small>
    <span id="totalClientes">0</span>
  </div>
</div>

<div class="filters">
  <input
    id="filtroCliente"
    class="search"
    placeholder="Filtrar por cliente"
    oninput="aplicarFiltros()"
  >

  <input
    id="filtroLoja"
    class="search"
    placeholder="Filtrar por loja"
    oninput="aplicarFiltros()"
  >

  <select
    id="filtroStatus"
    class="select"
    onchange="aplicarFiltros()"
  >
    <option value="">Todos os status</option>
    <option value="CONFIRMADO">Confirmado</option>
    <option value="CANCELADO">Cancelado</option>
    <option value="PENDENTE_PAGAMENTO">Pendente Pagamento</option>
  </select>
</div>

<div class="actions-top">
  <div id="selecionadosInfo" class="selected-info">0 selecionados</div>

  <button id="btnExcluir" class="btn-danger" onclick="excluirSelecionados()" disabled>
    Excluir Selecionados
  </button>
</div>

<div class="table-card">
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>
            <input type="checkbox" id="checkAll" class="check">
          </th>
          <th>Data</th>
          <th>Horário</th>
          <th>Cliente</th>
          <th>WhatsApp</th>
          <th>Loja</th>
          <th>Status</th>
          <th>Valor</th>
        </tr>
      </thead>

      <tbody id="tbody">
        <tr>
          <td colspan="8">
            <div class="empty">Carregando...</div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<div id="overlay">
  <div class="spinner"></div>
</div>

<div id="toast" class="toast"></div>

<script>
const sb = supabase.createClient(
  "https://egxjgmzukjyyxmkukwub.supabase.co",
  "sb_publishable_EWwdrLOUk6KDHZGLuh4uRg_QDRtLeFi"
);

let agendamentos=[];
let lojasMap={};
let listaAtual=[];

/* ================= CARREGAR ================= */
async function carregar(){

  overlay.style.display="flex";

  tbody.innerHTML=`
    <tr>
      <td colspan="8">
        <div class="empty">Carregando...</div>
      </td>
    </tr>
  `;

  const { data, error } = await sb
    .from("agendamentos")
    .select("*")
    .order("data",{ ascending:false });

  if(error){

    overlay.style.display="none";

    tbody.innerHTML=`
      <tr>
        <td colspan="8">
          <div class="empty">Erro ao carregar</div>
        </td>
      </tr>
    `;

    aviso("Erro ao carregar agendamentos");
    console.error(error);
    return;

  }

  agendamentos=data||[];

  lojasMap={};

  const lojasIds=[
    ...new Set(
      agendamentos
        .map(a=>a.loja_id)
        .filter(Boolean)
    )
  ];

  if(lojasIds.length){

    const { data:lojas, error:erroLojas } = await sb
      .from("user_profile")
      .select("user_id,negocio")
      .in("user_id",lojasIds);

    if(!erroLojas && lojas){
      lojas.forEach(l=>{
        lojasMap[l.user_id]=l.negocio;
      });
    }

  }

  overlay.style.display="none";

  aplicarFiltros();

}

/* ================= FILTROS ================= */
function aplicarFiltros(){

  const fc=(filtroCliente.value||"").toLowerCase().trim();
  const fl=(filtroLoja.value||"").toLowerCase().trim();
  const fs=filtroStatus.value;

  listaAtual=agendamentos.filter(a=>{

    const cliente=String(a.cliente_nome||"").toLowerCase();
    const whatsapp=String(a.cliente_whatsapp||"").toLowerCase();
    const loja=String(lojasMap[a.loja_id]||a.loja_id||"").toLowerCase();

    return (!fc || cliente.includes(fc) || whatsapp.includes(fc)) &&
           (!fl || loja.includes(fl)) &&
           (!fs || a.status===fs);

  });

  render(listaAtual);

}

/* ================= RENDER ================= */
function render(lista){

  totalReg.innerText=lista.length+" registros";

  totalAg.innerText=lista.length;

  const total=lista.reduce((s,x)=>s+Number(x.valor_total||0),0);

  totalValor.innerText=total.toLocaleString("pt-BR",{
    style:"currency",
    currency:"BRL"
  });

  totalLojas.innerText=new Set(
    lista.map(a=>a.loja_id).filter(Boolean)
  ).size;

  totalClientes.innerText=new Set(
    lista.map(a=>a.cliente_whatsapp).filter(Boolean)
  ).size;

  checkAll.checked=false;
  atualizarSelecionados();

  if(!lista.length){

    tbody.innerHTML=`
      <tr>
        <td colspan="8">
          <div class="empty">Nenhum resultado encontrado</div>
        </td>
      </tr>
    `;

    return;

  }

  tbody.innerHTML=lista.map(a=>{

    const status=a.status||"OUTRO";

    const statusClass=[
      "CONFIRMADO",
      "CANCELADO",
      "PENDENTE_PAGAMENTO"
    ].includes(status) ? status : "OUTRO";

    return `
      <tr>
        <td>
          <input
            type="checkbox"
            class="check row-check"
            value="${textoAttr(a.id)}"
            onchange="atualizarSelecionados()"
          >
        </td>

        <td>${formatarData(a.data)}</td>

        <td>${textoSeguro(a.hora_inicio || "-")}</td>

        <td>
          <div class="cliente-box">
            <div class="cliente-nome">${textoSeguro(a.cliente_nome || "-")}</div>
            <div class="cliente-sub">ID: ${textoSeguro(a.id || "-")}</div>
          </div>
        </td>

        <td>
          ${
            a.cliente_whatsapp
            ? `<a href="https://wa.me/55${somenteNumeros(a.cliente_whatsapp)}" target="_blank">${textoSeguro(a.cliente_whatsapp)}</a>`
            : `<span class="text-muted">-</span>`
          }
        </td>

        <td>
          <div class="loja-nome">
            ${textoSeguro(lojasMap[a.loja_id] || a.loja_id || "-")}
          </div>
        </td>

        <td>
          <span class="badge ${statusClass}">
            ${textoSeguro(status)}
          </span>
        </td>

        <td>${formatarMoeda(a.valor_total)}</td>
      </tr>
    `;

  }).join("");

}

/* ================= SELEÇÃO ================= */
checkAll.addEventListener("change",()=>{

  document.querySelectorAll(".row-check").forEach(c=>{
    c.checked=checkAll.checked;
  });

  atualizarSelecionados();

});

function atualizarSelecionados(){

  const checks=[...document.querySelectorAll(".row-check")];
  const marcados=checks.filter(c=>c.checked);

  selecionadosInfo.innerText=marcados.length+" selecionados";
  btnExcluir.disabled=marcados.length===0;

  if(checks.length){
    checkAll.checked=marcados.length===checks.length;
    checkAll.indeterminate=marcados.length>0 && marcados.length<checks.length;
  }else{
    checkAll.checked=false;
    checkAll.indeterminate=false;
  }

}

/* ================= EXCLUIR ================= */
async function excluirSelecionados(){

  const ids=[...document.querySelectorAll(".row-check:checked")]
    .map(i=>i.value);

  if(!ids.length){
    aviso("Selecione ao menos um agendamento");
    return;
  }

  const confirmar=confirm("Tem certeza que deseja excluir permanentemente os registros selecionados?");

  if(!confirmar){
    return;
  }

  overlay.style.display="flex";

  const { error } = await sb
    .from("agendamentos")
    .delete()
    .in("id",ids);

  overlay.style.display="none";

  if(error){
    aviso("Erro ao excluir");
    console.error(error);
    return;
  }

  aviso("Excluído com sucesso");
  carregar();

}

/* ================= HELPERS ================= */
function formatarMoeda(valor){

  const numero=Number(valor||0);

  return numero.toLocaleString("pt-BR",{
    style:"currency",
    currency:"BRL"
  });

}

function formatarData(valor){

  if(!valor){
    return "-";
  }

  const partes=String(valor).split("-");

  if(partes.length===3){
    return `${partes[2]}/${partes[1]}/${partes[0]}`;
  }

  const data=new Date(valor);

  if(isNaN(data.getTime())){
    return "-";
  }

  return data.toLocaleDateString("pt-BR");

}

function somenteNumeros(valor){

  return String(valor||"").replace(/\D/g,"");

}

function textoSeguro(valor){

  if(valor===null || valor===undefined || valor===""){
    return '<span class="text-muted">-</span>';
  }

  return String(valor)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");

}

function textoAttr(valor){

  if(valor===null || valor===undefined){
    return "";
  }

  return String(valor)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");

}

function aviso(msg){

  toast.innerText=msg;
  toast.style.display="block";

  clearTimeout(window.toastTimer);

  window.toastTimer=setTimeout(()=>{
    toast.style.display="none";
  },2500);

}

document.addEventListener("keydown",(e)=>{

  if(e.key==="Escape"){
    checkAll.checked=false;

    document.querySelectorAll(".row-check").forEach(c=>{
      c.checked=false;
    });

    atualizarSelecionados();
  }

});

carregar();
</script>

</body>
</html>
