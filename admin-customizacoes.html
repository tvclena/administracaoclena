<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Customizações</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --primary:#2563eb;
  --primary-dark:#1e40af;
  --bg:#f4f6fb;
  --card:#ffffff;
  --border:#eef2f7;
  --text:#0f172a;
  --muted:#64748b;
  --success:#16a34a;
  --danger:#dc2626;
}

*{box-sizing:border-box;font-family:Inter}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
.header{
  height:64px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 28px;
  background:#fff;
  border-bottom:0.5px solid var(--border);
  font-weight:900;
  font-size:18px;
}

/* KPIs */
.kpis{
  display:flex;
  gap:18px;
  padding:18px 28px;
  font-size:13px;
}

.kpis div{
  background:#fff;
  padding:14px 18px;
  border-radius:14px;
  border:0.5px solid var(--border);
}

.kpis span{
  font-weight:900;
  font-size:16px;
}

/* TABLE */
.table-card{
  margin:0 28px 28px;
  background:#fff;
  border-radius:16px;
  border:0.5px solid var(--border);
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:13px;
}

th{
  text-align:left;
  padding:14px;
  background:#fafafa;
  font-weight:800;
  border-bottom:0.5px solid var(--border);
}

td{
  padding:14px;
  border-bottom:0.5px solid var(--border);
}

tr:hover{
  background:#f8fafc;
}

.badge{
  padding:4px 12px;
  border-radius:999px;
  font-size:11px;
  font-weight:800;
}

.on{background:#dcfce7;color:#166534}
.off{background:#fee2e2;color:#991b1b}

/* MENU */
.menu-btn{
  background:none;
  border:none;
  font-size:18px;
  cursor:pointer;
}

/* DROPDOWN FIXO */
.dropdown{
  position:fixed;
  background:#fff;
  border:0.5px solid var(--border);
  border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,.08);
  display:none;
  min-width:150px;
  z-index:1000;
}

.dropdown div{
  padding:10px 14px;
  cursor:pointer;
  font-size:13px;
}

.dropdown div:hover{
  background:#f3f4f6;
}

/* FAB */
.fab{
  position:fixed;
  right:28px;
  bottom:28px;
  width:58px;
  height:58px;
  border-radius:50%;
  background:linear-gradient(180deg,var(--primary),var(--primary-dark));
  color:#fff;
  font-size:26px;
  border:none;
  cursor:pointer;
  box-shadow:0 12px 25px rgba(37,99,235,.35);
}

/* OVERLAY */
#overlay{
  position:fixed;
  inset:0;
  background:rgba(255,255,255,.75);
  backdrop-filter:blur(3px);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:2000;
}

.spinner{
  width:40px;
  height:40px;
  border:4px solid #e5e7eb;
  border-top-color:var(--primary);
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

<body>

<div class="header">
  Customizações
  <div id="totalReg">0 registros</div>
</div>

<div class="kpis">
  <div>Total: <span id="kpiTotal">0</span></div>
  <div>Ativas: <span id="kpiAtivas">0</span></div>
  <div>Inativas: <span id="kpiInativas">0</span></div>
</div>

<div class="table-card">
  <table>
    <thead>
      <tr>
        <th>Loja</th>
        <th>Palavras</th>
        <th>Caminho</th>
        <th>Status</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="lista"></tbody>
  </table>
</div>

<div id="dropdown" class="dropdown"></div>

<div id="overlay">
  <div class="spinner"></div>
</div>

<script>
const sb = supabase.createClient(
  "https://egxjgmzukjyyxmkukwub.supabase.co",
  "sb_publishable_EWwdrLOUk6KDHZGLuh4uRg_QDRtLeFi"
);

let customizacoes=[];

async function carregar(){
  const { data } = await sb.from("loja_customizacoes").select("*");
  customizacoes=data||[];
  atualizarKPIs();
  render();
}

function atualizarKPIs(){
  const total=customizacoes.length;
  const ativas=customizacoes.filter(x=>x.ativo).length;
  kpiTotal.innerText=total;
  kpiAtivas.innerText=ativas;
  kpiInativas.innerText=total-ativas;
  totalReg.innerText=total+" registros";
}

function abrirMenu(e,id,ativo){
  e.stopPropagation();
  const menu=document.getElementById("dropdown");

  menu.innerHTML=`
    <div onclick="alterarStatus('${id}',${ativo})">
      ${ativo?'Desativar':'Ativar'}
    </div>
    <div onclick="excluir('${id}')">Excluir</div>
  `;

  menu.style.display="block";
  menu.style.top=e.clientY+"px";
  menu.style.left=(e.clientX-150)+"px";
}

document.addEventListener("click",()=>{
  dropdown.style.display="none";
});

async function alterarStatus(id,ativo){
  dropdown.style.display="none";
  overlay.style.display="flex";

  await sb.from("loja_customizacoes")
    .update({ativo:!ativo})
    .eq("id",id);

  overlay.style.display="none";
  carregar();
}

async function excluir(id){
  dropdown.style.display="none";
  overlay.style.display="flex";

  await sb.from("loja_customizacoes")
    .delete()
    .eq("id",id);

  overlay.style.display="none";
  carregar();
}

function render(){
  lista.innerHTML = customizacoes.map(c=>`
    <tr>
      <td>${c.loja_id}</td>
      <td>${c.palavras_chave}</td>
      <td>${c.caminho_html}</td>
      <td><span class="badge ${c.ativo?'on':'off'}">
        ${c.ativo?'Ativo':'Inativo'}
      </span></td>
      <td>
        <button class="menu-btn"
          onclick="abrirMenu(event,'${c.id}',${c.ativo})">
          ⋮
        </button>
      </td>
    </tr>
  `).join("");
}

carregar();
</script>

</body>
</html>
