<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width,
               initial-scale=1,
               maximum-scale=1,
               user-scalable=no,
               viewport-fit=cover">

<meta name="theme-color" content="#2563eb">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --primary:#2563eb;
  --primary-dark:#1e40af;
  --bg:#f3f6fb;
  --card:#ffffff;
  --border:#e5e7eb;
  --text:#0f172a;
  --muted:#64748b;
  --success:#16a34a;
  --danger:#dc2626;
}

*{box-sizing:border-box;font-family:Inter}

body{
  margin:0;
  height:100vh;
  display:flex;
  flex-direction:column;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
.header{
  height:70px;
  background:linear-gradient(90deg,var(--primary),var(--primary-dark));
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 28px;
  font-weight:800;
  font-size:18px;
}

/* KPI */
.kpis{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:18px;
  padding:20px 28px;
}

.kpi{
  background:var(--card);
  border-radius:20px;
  padding:18px;
  box-shadow:0 10px 30px rgba(0,0,0,.06);
  border:1px solid var(--border);
}

.kpi h3{
  margin:0;
  font-size:13px;
  color:var(--muted);
  font-weight:700;
}

.kpi span{
  font-size:26px;
  font-weight:900;
}

/* MAIN */
.main{
  flex:1;
  display:grid;
  grid-template-columns:360px 1fr;
  gap:20px;
  padding:0 28px 28px;
  overflow:hidden;
}

/* FORM */
.form-card{
  background:var(--card);
  border-radius:22px;
  padding:22px;
  border:1px solid var(--border);
  box-shadow:0 10px 30px rgba(0,0,0,.06);
  display:flex;
  flex-direction:column;
  gap:14px;
}

input,button{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:1px solid var(--border);
  font-weight:600;
  font-size:14px;
}

button{
  background:var(--primary);
  color:#fff;
  border:none;
  cursor:pointer;
}

button.sec{
  background:#f1f5f9;
  color:#111;
}

/* LIST */
.list-card{
  background:var(--card);
  border-radius:22px;
  border:1px solid var(--border);
  box-shadow:0 10px 30px rgba(0,0,0,.06);
  overflow:hidden;
  display:flex;
  flex-direction:column;
}

.table-wrap{
  flex:1;
  overflow:auto;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:14px;
  font-size:13px;
  border-bottom:1px solid var(--border);
}

th{
  background:#f8fafc;
  text-align:left;
  font-weight:800;
  position:sticky;
  top:0;
}

tr:hover{
  background:#f1f5f9;
}

.badge{
  padding:4px 12px;
  border-radius:999px;
  font-size:11px;
  font-weight:800;
}

.on{background:#dcfce7;color:#166534}
.off{background:#fee2e2;color:#991b1b}

/* MOBILE */
@media(max-width:1000px){
  .kpis{grid-template-columns:1fr 1fr}
  .main{grid-template-columns:1fr}
}

@media(max-width:600px){
  .kpis{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div class="header">
  Painel de Customizações
  <div id="totalIndicador">0 registros</div>
</div>

<div class="kpis">
  <div class="kpi">
    <h3>Total Customizações</h3>
    <span id="kpiTotal">0</span>
  </div>
  <div class="kpi">
    <h3>Ativas</h3>
    <span id="kpiAtivas">0</span>
  </div>
  <div class="kpi">
    <h3>Inativas</h3>
    <span id="kpiInativas">0</span>
  </div>
  <div class="kpi">
    <h3>Lojas Ativas</h3>
    <span id="kpiLojas">0</span>
  </div>
</div>

<div class="main">

  <!-- FORM -->
  <div class="form-card">
    <h3>Nova Customização</h3>
    <input id="buscaLoja" placeholder="Buscar loja ativa...">
    <input id="palavras" placeholder="Palavras-chave (#Polaroid#)">
    <input id="caminho" placeholder="Caminho HTML">
    <button onclick="salvar()">Salvar</button>
    <button class="sec" onclick="limpar()">Limpar</button>
  </div>

  <!-- LIST -->
  <div class="list-card">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Loja</th>
            <th>Palavras</th>
            <th>Caminho</th>
            <th>Status</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="lista"></tbody>
      </table>
    </div>
  </div>

</div>

<script>
const sb = supabase.createClient(
  "https://egxjgmzukjyyxmkukwub.supabase.co",
  "sb_publishable_EWwdrLOUk6KDHZGLuh4uRg_QDRtLeFi"
);

let lojas=[], customizacoes=[], lojaSelecionada=null, editando=null;

async function load(){
  const { data } = await sb
    .from("user_profile")
    .select("user_id, negocio")
    .eq("status","active");

  lojas=data||[];
  document.getElementById("kpiLojas").innerText = lojas.length;
  carregar();
}

async function carregar(){
  const { data } = await sb.from("loja_customizacoes").select("*");
  customizacoes=data||[];
  atualizarKPIs();
  render();
}

function atualizarKPIs(){
  const total=customizacoes.length;
  const ativas=customizacoes.filter(x=>x.ativo).length;
  const inativas=total-ativas;

  kpiTotal.innerText=total;
  kpiAtivas.innerText=ativas;
  kpiInativas.innerText=inativas;
  totalIndicador.innerText=`${total} registros`;
}

async function salvar(){
  if(!buscaLoja.value||!palavras.value||!caminho.value){
    alert("Preencha tudo");
    return;
  }

  const loja=lojas.find(l=>l.negocio===buscaLoja.value);
  if(!loja){
    alert("Loja inválida");
    return;
  }

  const payload={
    loja_id:loja.user_id,
    palavras_chave:palavras.value,
    caminho_html:caminho.value,
    ativo:true
  };

  editando
    ? await sb.from("loja_customizacoes").update(payload).eq("id",editando)
    : await sb.from("loja_customizacoes").insert(payload);

  limpar();
  carregar();
}

function editar(id){
  const c=customizacoes.find(x=>x.id===id);
  editando=id;
  buscaLoja.value=lojas.find(l=>l.user_id===c.loja_id)?.negocio||"";
  palavras.value=c.palavras_chave;
  caminho.value=c.caminho_html;
}

async function alternar(id,a){
  await sb.from("loja_customizacoes").update({ativo:!a}).eq("id",id);
  carregar();
}

async function excluir(id){
  if(confirm("Excluir?")){
    await sb.from("loja_customizacoes").delete().eq("id",id);
    carregar();
  }
}

function limpar(){
  editando=null;
  buscaLoja.value="";
  palavras.value="";
  caminho.value="";
}

function render(){
  lista.innerHTML = customizacoes.map(c=>{
    const loja=lojas.find(l=>l.user_id===c.loja_id)?.negocio||"—";
    return `
      <tr>
        <td>${loja}</td>
        <td>${c.palavras_chave}</td>
        <td>${c.caminho_html}</td>
        <td><span class="badge ${c.ativo?'on':'off'}">${c.ativo?'Ativo':'Inativo'}</span></td>
        <td>
          <button onclick="editar('${c.id}')">Editar</button>
          <button onclick="alternar('${c.id}',${c.ativo})">On/Off</button>
          <button onclick="excluir('${c.id}')">Excluir</button>
        </td>
      </tr>`;
  }).join("");
}

load();
</script>

</body>
</html>
