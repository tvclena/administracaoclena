<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Painel de Customizações</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --primary:#2563eb;
  --primary-dark:#1e40af;
  --bg:#f3f6fb;
  --card:#ffffff;
  --border:#e5e7eb;
  --text:#0f172a;
  --muted:#64748b;
  --success:#16a34a;
  --danger:#dc2626;
}

*{box-sizing:border-box;font-family:Inter}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
.header{
  height:70px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 28px;
  background:#fff;
  border-bottom:1px solid var(--border);
  font-weight:900;
  font-size:18px;
}

/* KPIs */
.kpis{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:16px;
  padding:20px 28px 0;
}

.kpi{
  background:var(--card);
  padding:18px;
  border-radius:18px;
  border:1px solid var(--border);
  box-shadow:0 6px 18px rgba(0,0,0,.05);
}

.kpi small{
  color:var(--muted);
  font-weight:600;
  font-size:12px;
}

.kpi h2{
  margin:6px 0 0;
  font-size:24px;
  font-weight:900;
}

/* TABLE CARD */
.table-card{
  margin:20px 28px;
  background:#fff;
  border-radius:18px;
  border:1px solid var(--border);
  box-shadow:0 6px 20px rgba(0,0,0,.05);
  overflow:hidden;
}

table{
  width:100%;
  border-collapse:collapse;
}

th{
  text-align:left;
  padding:14px;
  background:#f8fafc;
  font-weight:800;
  font-size:13px;
}

td{
  padding:14px;
  font-size:13px;
  border-top:1px solid var(--border);
}

tr:hover{
  background:#f1f5f9;
}

.badge{
  padding:4px 10px;
  border-radius:999px;
  font-size:11px;
  font-weight:800;
}

.on{background:#dcfce7;color:#166534}
.off{background:#fee2e2;color:#991b1b}

/* MENU */
.menu{position:relative}
.menu-btn{
  background:none;
  border:none;
  font-size:18px;
  cursor:pointer;
}
.dropdown{
  position:absolute;
  right:0;
  top:26px;
  background:#fff;
  border:1px solid var(--border);
  border-radius:10px;
  box-shadow:0 10px 25px rgba(0,0,0,.08);
  display:none;
  min-width:140px;
  z-index:100;
}
.dropdown div{
  padding:10px;
  cursor:pointer;
}
.dropdown div:hover{background:#f1f5f9}

/* FAB */
.fab{
  position:fixed;
  right:24px;
  bottom:24px;
  width:60px;
  height:60px;
  border-radius:50%;
  background:linear-gradient(180deg,var(--primary),var(--primary-dark));
  color:#fff;
  font-size:28px;
  border:none;
  cursor:pointer;
  box-shadow:0 10px 25px rgba(37,99,235,.4);
}

/* MODAL */
#modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.45);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:200;
}

.modal-box{
  background:#fff;
  width:100%;
  max-width:420px;
  padding:24px;
  border-radius:18px;
  box-shadow:0 15px 40px rgba(0,0,0,.2);
  display:flex;
  flex-direction:column;
  gap:12px;
}

.modal-box h3{
  margin:0 0 10px;
  font-weight:900;
}

input{
  padding:12px;
  border-radius:12px;
  border:1px solid var(--border);
  font-size:14px;
}

button.primary{
  background:var(--primary);
  color:#fff;
  border:none;
  padding:12px;
  border-radius:12px;
  font-weight:800;
}

button.sec{
  background:#f1f5f9;
  border:none;
  padding:12px;
  border-radius:12px;
}

@media(max-width:600px){
  .table-card{margin:16px}
  .kpis{padding:16px}
}
</style>
</head>

<body>

<div class="header">
  Customizações
  <div id="totalReg">0 registros</div>
</div>

<div class="kpis">
  <div class="kpi"><small>Total</small><h2 id="kpiTotal">0</h2></div>
  <div class="kpi"><small>Ativas</small><h2 id="kpiAtivas">0</h2></div>
  <div class="kpi"><small>Inativas</small><h2 id="kpiInativas">0</h2></div>
  <div class="kpi"><small>Lojas Ativas</small><h2 id="kpiLojas">0</h2></div>
</div>

<div class="table-card">
  <table>
    <thead>
      <tr>
        <th>Loja</th>
        <th>Palavras</th>
        <th>Caminho</th>
        <th>Status</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="lista"></tbody>
  </table>
</div>

<button class="fab" onclick="abrirModal()">+</button>

<!-- MODAL -->
<div id="modal">
  <div class="modal-box">
    <h3>Nova Customização</h3>
    <input id="buscaLoja" placeholder="Nome da loja">
    <input id="palavras" placeholder="Palavras-chave">
    <input id="caminho" placeholder="Caminho HTML">
    <button class="primary" onclick="salvar()">Salvar</button>
    <button class="sec" onclick="fecharModal()">Cancelar</button>
  </div>
</div>

<script>
const sb = supabase.createClient(
  "https://egxjgmzukjyyxmkukwub.supabase.co",
  "sb_publishable_EWwdrLOUk6KDHZGLuh4uRg_QDRtLeFi"
);

let lojas=[], customizacoes=[], editando=null;

async function load(){
  const { data } = await sb.from("user_profile")
    .select("user_id, negocio")
    .eq("status","active");

  lojas=data||[];
  kpiLojas.innerText=lojas.length;
  carregar();
}

async function carregar(){
  const { data } = await sb.from("loja_customizacoes").select("*");
  customizacoes=data||[];
  atualizarKPIs();
  render();
}

function atualizarKPIs(){
  const total=customizacoes.length;
  const ativas=customizacoes.filter(x=>x.ativo).length;
  const inativas=total-ativas;

  kpiTotal.innerText=total;
  kpiAtivas.innerText=ativas;
  kpiInativas.innerText=inativas;
  totalReg.innerText=total+" registros";
}

function abrirModal(){
  modal.style.display="flex";
}

function fecharModal(){
  modal.style.display="none";
  limpar();
}

async function salvar(){
  const loja=lojas.find(l=>l.negocio===buscaLoja.value);
  if(!loja||!palavras.value||!caminho.value){
    alert("Preencha corretamente");
    return;
  }

  const payload={
    loja_id:loja.user_id,
    palavras_chave:palavras.value,
    caminho_html:caminho.value,
    ativo:true
  };

  editando
    ? await sb.from("loja_customizacoes").update(payload).eq("id",editando)
    : await sb.from("loja_customizacoes").insert(payload);

  fecharModal();
  carregar();
}

function editar(id){
  const c=customizacoes.find(x=>x.id===id);
  editando=id;
  buscaLoja.value=lojas.find(l=>l.user_id===c.loja_id)?.negocio||"";
  palavras.value=c.palavras_chave;
  caminho.value=c.caminho_html;
  abrirModal();
}

async function alternar(id,a){
  await sb.from("loja_customizacoes").update({ativo:!a}).eq("id",id);
  carregar();
}

async function excluir(id){
  if(confirm("Excluir?")){
    await sb.from("loja_customizacoes").delete().eq("id",id);
    carregar();
  }
}

function limpar(){
  editando=null;
  buscaLoja.value="";
  palavras.value="";
  caminho.value="";
}

function toggleMenu(id){
  document.querySelectorAll(".dropdown").forEach(d=>d.style.display="none");
  const el=document.getElementById("menu-"+id);
  if(el) el.style.display="block";
}

function render(){
  lista.innerHTML = customizacoes.map(c=>{
    const loja=lojas.find(l=>l.user_id===c.loja_id)?.negocio||"—";
    return `
      <tr>
        <td>${loja}</td>
        <td>${c.palavras_chave}</td>
        <td>${c.caminho_html}</td>
        <td><span class="badge ${c.ativo?'on':'off'}">${c.ativo?'Ativo':'Inativo'}</span></td>
        <td>
          <div class="menu">
            <button class="menu-btn" onclick="toggleMenu('${c.id}')">⋮</button>
            <div class="dropdown" id="menu-${c.id}">
              <div onclick="editar('${c.id}')">Editar</div>
              <div onclick="alternar('${c.id}',${c.ativo})">Ativar/Inativar</div>
              <div onclick="excluir('${c.id}')">Excluir</div>
            </div>
          </div>
        </td>
      </tr>`;
  }).join("");
}

document.addEventListener("click",e=>{
  if(!e.target.closest(".menu")){
    document.querySelectorAll(".dropdown").forEach(d=>d.style.display="none");
  }
});

load();
</script>

</body>
</html>
