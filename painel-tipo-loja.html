<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#2563eb">

<title>Central Admin • Tipos de Loja</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --primary:#2563eb;
  --primary-dark:#1e40af;
  --bg:#f4f6fb;
  --card:#ffffff;
  --border:#eef2f7;
  --text:#0f172a;
  --muted:#64748b;
  --success:#16a34a;
  --danger:#dc2626;
  --warn:#f59e0b;
}

*{
  box-sizing:border-box;
  font-family:Inter,Arial,sans-serif;
  -webkit-tap-highlight-color:transparent;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

/* HEADER */
.header{
  min-height:64px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:14px 28px;
  background:#fff;
  border-bottom:0.5px solid var(--border);
}

.header h1{
  margin:0;
  font-size:20px;
  font-weight:900;
}

.header-right{
  display:flex;
  align-items:center;
  gap:12px;
  font-size:13px;
  color:var(--muted);
  font-weight:800;
}

/* BOTÕES */
.btn-primary{
  border:none;
  background:linear-gradient(180deg,var(--primary),var(--primary-dark));
  color:#fff;
  padding:11px 16px;
  border-radius:12px;
  font-weight:900;
  cursor:pointer;
  box-shadow:0 8px 18px rgba(37,99,235,.25);
}

.btn-light{
  border:0.5px solid var(--border);
  background:#fff;
  color:var(--text);
  padding:11px 16px;
  border-radius:12px;
  font-weight:900;
  cursor:pointer;
}

.btn-danger{
  border:none;
  background:var(--danger);
  color:#fff;
  padding:11px 16px;
  border-radius:12px;
  font-weight:900;
  cursor:pointer;
}

.btn-small{
  padding:8px 12px;
  border-radius:10px;
  font-size:12px;
}

/* KPIS */
.kpis{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:18px;
  padding:18px 28px;
  font-size:13px;
}

.kpis div{
  background:#fff;
  padding:16px 18px;
  border-radius:14px;
  border:0.5px solid var(--border);
}

.kpis small{
  display:block;
  color:var(--muted);
  font-weight:800;
  margin-bottom:6px;
}

.kpis span{
  font-weight:900;
  font-size:22px;
}

/* FILTROS */
.filters{
  display:grid;
  grid-template-columns:1fr 170px;
  gap:12px;
  padding:0 28px 18px;
}

.search,
.select{
  width:100%;
  border:0.5px solid var(--border);
  background:#fff;
  border-radius:14px;
  padding:13px 14px;
  font-size:14px;
  outline:none;
}

/* TABELA */
.table-card{
  margin:0 28px 28px;
  background:#fff;
  border-radius:16px;
  border:0.5px solid var(--border);
  overflow:hidden;
}

.table-wrap{
  width:100%;
  overflow:auto;
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:13px;
  min-width:760px;
}

th{
  text-align:left;
  padding:14px;
  background:#fafafa;
  font-weight:900;
  border-bottom:0.5px solid var(--border);
  color:#334155;
  white-space:nowrap;
}

td{
  padding:14px;
  border-bottom:0.5px solid var(--border);
  vertical-align:middle;
}

tr:hover{
  background:#f8fafc;
}

.empty{
  padding:35px;
  text-align:center;
  color:var(--muted);
  font-weight:800;
}

.text-muted{
  color:var(--muted);
}

.tipo-nome{
  font-weight:900;
  color:var(--text);
}

.tipo-sub{
  color:var(--muted);
  font-size:11px;
  font-weight:700;
  margin-top:3px;
}

.badge{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:5px 12px;
  border-radius:999px;
  font-size:11px;
  font-weight:900;
  white-space:nowrap;
  text-transform:uppercase;
}

.on{
  background:#dcfce7;
  color:#166534;
}

.off{
  background:#fee2e2;
  color:#991b1b;
}

/* MENU */
.menu-btn{
  width:34px;
  height:34px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#fff;
  border:0.5px solid var(--border);
  border-radius:10px;
  font-size:18px;
  cursor:pointer;
}

.menu-btn:hover{
  background:#f8fafc;
}

/* DROPDOWN */
.dropdown{
  position:fixed;
  background:#fff;
  border:0.5px solid var(--border);
  border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,.12);
  display:none;
  min-width:170px;
  z-index:1000;
  overflow:hidden;
}

.dropdown div{
  display:block;
  padding:12px 14px;
  cursor:pointer;
  font-size:13px;
  font-weight:800;
  color:var(--text);
  text-decoration:none;
}

.dropdown div:hover{
  background:#f3f4f6;
}

.dropdown .danger{
  color:var(--danger);
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(15,23,42,.45);
  backdrop-filter:blur(3px);
  display:none;
  align-items:center;
  justify-content:center;
  padding:18px;
  z-index:1500;
}

.modal-card{
  width:100%;
  max-width:680px;
  max-height:92vh;
  background:#fff;
  border-radius:20px;
  box-shadow:0 25px 70px rgba(0,0,0,.22);
  overflow:auto;
}

.modal-head{
  padding:20px 22px;
  border-bottom:0.5px solid var(--border);
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  position:sticky;
  top:0;
  background:#fff;
  z-index:5;
}

.modal-head h2{
  margin:0;
  font-size:18px;
  font-weight:900;
}

.close-btn{
  border:none;
  background:#f1f5f9;
  width:34px;
  height:34px;
  border-radius:10px;
  cursor:pointer;
  font-size:18px;
  font-weight:900;
}

.modal-body{
  padding:22px;
}

.form-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:14px;
}

.form-group{
  min-width:0;
}

.form-group.full{
  grid-column:1/-1;
}

.form-group label{
  display:block;
  font-size:12px;
  font-weight:900;
  color:#334155;
  margin-bottom:7px;
}

.form-group input,
.form-group select{
  width:100%;
  border:0.5px solid var(--border);
  border-radius:12px;
  padding:13px 14px;
  font-size:14px;
  outline:none;
  background:#fff;
}

.form-group input:focus,
.form-group select:focus{
  border-color:var(--primary);
  box-shadow:0 0 0 3px rgba(37,99,235,.10);
}

.modal-actions{
  display:flex;
  justify-content:flex-end;
  gap:10px;
  padding:18px 22px;
  border-top:0.5px solid var(--border);
  background:#fafafa;
  position:sticky;
  bottom:0;
}

/* FAB */
.fab{
  position:fixed;
  right:28px;
  bottom:28px;
  width:58px;
  height:58px;
  border-radius:50%;
  background:linear-gradient(180deg,var(--primary),var(--primary-dark));
  color:#fff;
  font-size:28px;
  border:none;
  cursor:pointer;
  box-shadow:0 12px 25px rgba(37,99,235,.35);
  z-index:500;
}

/* TOAST */
.toast{
  position:fixed;
  left:50%;
  bottom:28px;
  transform:translateX(-50%);
  background:#0f172a;
  color:#fff;
  padding:12px 18px;
  border-radius:999px;
  font-size:13px;
  font-weight:900;
  display:none;
  z-index:4000;
}

/* OVERLAY */
#overlay{
  position:fixed;
  inset:0;
  background:rgba(255,255,255,.75);
  backdrop-filter:blur(3px);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:3000;
}

.spinner{
  width:40px;
  height:40px;
  border:4px solid #e5e7eb;
  border-top-color:var(--primary);
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  to{
    transform:rotate(360deg);
  }
}

@media(max-width:900px){
  .kpis{
    grid-template-columns:1fr;
    padding:14px;
    gap:10px;
  }

  .filters{
    grid-template-columns:1fr;
    padding:0 14px 14px;
  }

  .table-card{
    margin:0 14px 90px;
  }

  .form-grid{
    grid-template-columns:1fr;
  }
}

@media(max-width:700px){
  .header{
    padding:14px;
    align-items:flex-start;
    flex-direction:column;
  }

  .header-right{
    width:100%;
    justify-content:space-between;
  }

  .fab{
    right:18px;
    bottom:18px;
  }
}
</style>
</head>

<body>

<div class="header">
  <h1>Central Admin • Tipos de Loja</h1>

  <div class="header-right">
    <div id="totalReg">0 registros</div>
    <button class="btn-primary" onclick="abrirNovo()">Adicionar</button>
  </div>
</div>

<div class="kpis">
  <div>
    <small>Total</small>
    <span id="kpiTotal">0</span>
  </div>

  <div>
    <small>Ativos</small>
    <span id="kpiAtivos">0</span>
  </div>

  <div>
    <small>Inativos</small>
    <span id="kpiInativos">0</span>
  </div>
</div>

<div class="filters">
  <input
    id="f_busca"
    class="search"
    type="text"
    placeholder="Buscar tipo, slug ou caminho..."
    oninput="render()"
  >

  <select id="f_status" class="select" onchange="render()">
    <option value="">Todos</option>
    <option value="true">Ativos</option>
    <option value="false">Inativos</option>
  </select>
</div>

<div class="table-card">
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Tipo</th>
          <th>Slug</th>
          <th>App Path</th>
          <th>Status</th>
          <th>Criado em</th>
          <th>Ações</th>
        </tr>
      </thead>

      <tbody id="lista"></tbody>
    </table>
  </div>
</div>

<button class="fab" onclick="abrirNovo()">+</button>

<div id="dropdown" class="dropdown"></div>

<div id="modal" class="modal" onclick="fecharModalFora(event)">
  <div class="modal-card">

    <div class="modal-head">
      <h2 id="modalTitulo">Novo tipo de loja</h2>
      <button class="close-btn" onclick="fecharModal()">×</button>
    </div>

    <div class="modal-body">
      <div class="form-grid">

        <div class="form-group">
          <label for="campoNome">Nome do tipo</label>
          <input id="campoNome" placeholder="Ex: BARBEARIA">
        </div>

        <div class="form-group">
          <label for="campoSlug">Slug</label>
          <input id="campoSlug" placeholder="Ex: barbearia">
        </div>

        <div class="form-group full">
          <label for="campoAppPath">App Path</label>
          <input id="campoAppPath" placeholder="Ex: app.html">
        </div>

        <div class="form-group">
          <label for="campoAtivo">Status</label>
          <select id="campoAtivo">
            <option value="true">Ativo</option>
            <option value="false">Inativo</option>
          </select>
        </div>

      </div>
    </div>

    <div class="modal-actions">
      <button class="btn-light" onclick="fecharModal()">Cancelar</button>
      <button class="btn-primary" onclick="salvar()">Salvar</button>
    </div>

  </div>
</div>

<div id="overlay">
  <div class="spinner"></div>
</div>

<div id="toast" class="toast"></div>

<script>
const sb = supabase.createClient(
  "https://egxjgmzukjyyxmkukwub.supabase.co",
  "sb_publishable_EWwdrLOUk6KDHZGLuh4uRg_QDRtLeFi"
);

let tipos=[];
let editId=null;

async function load(){

  overlay.style.display="flex";

  const { data, error } = await sb
    .from("tipos_loja")
    .select("*")
    .order("created_at",{ ascending:false });

  overlay.style.display="none";

  if(error){
    aviso("Erro ao carregar tipos");
    console.error(error);
    return;
  }

  tipos=data||[];

  atualizarKPIs();
  render();

}

function atualizarKPIs(){

  const total=tipos.length;
  const ativos=tipos.filter(t=>t.ativo===true).length;
  const inativos=total-ativos;

  kpiTotal.innerText=total;
  kpiAtivos.innerText=ativos;
  kpiInativos.innerText=inativos;
  totalReg.innerText=total+" registros";

}

function abrirNovo(){

  editId=null;

  modalTitulo.innerText="Novo tipo de loja";

  campoNome.value="";
  campoSlug.value="";
  campoAppPath.value="";
  campoAtivo.value="true";

  modal.style.display="flex";

  setTimeout(()=>{
    campoNome.focus();
  },100);

}

function editar(id){

  const item=tipos.find(t=>t.id===id);

  if(!item){
    aviso("Registro não encontrado");
    return;
  }

  editId=item.id;

  modalTitulo.innerText="Editar tipo de loja";

  campoNome.value=item.nome||"";
  campoSlug.value=item.slug||"";
  campoAppPath.value=item.app_path||"";
  campoAtivo.value=String(item.ativo===false ? false : true);

  dropdown.style.display="none";
  modal.style.display="flex";

  setTimeout(()=>{
    campoNome.focus();
  },100);

}

function fecharModal(){

  modal.style.display="none";
  editId=null;

}

function fecharModalFora(event){

  if(event.target.id==="modal"){
    fecharModal();
  }

}

async function salvar(){

  const payload={
    nome:campoNome.value.trim().toUpperCase(),
    slug:campoSlug.value.trim().toLowerCase(),
    app_path:campoAppPath.value.trim(),
    ativo:campoAtivo.value==="true"
  };

  if(!payload.nome){
    aviso("Informe o nome do tipo");
    campoNome.focus();
    return;
  }

  if(!payload.slug){
    aviso("Informe o slug");
    campoSlug.focus();
    return;
  }

  if(!payload.app_path){
    aviso("Informe o app path");
    campoAppPath.focus();
    return;
  }

  overlay.style.display="flex";

  let error;

  if(editId){

    const resposta = await sb
      .from("tipos_loja")
      .update(payload)
      .eq("id",editId);

    error=resposta.error;

  }else{

    const resposta = await sb
      .from("tipos_loja")
      .insert(payload);

    error=resposta.error;

  }

  overlay.style.display="none";

  if(error){
    aviso("Erro ao salvar");
    console.error(error);
    return;
  }

  fecharModal();

  aviso(editId ? "Tipo atualizado" : "Tipo adicionado");

  load();

}

function abrirMenu(event,id,ativo){

  event.stopPropagation();

  dropdown.innerHTML=`
    <div onclick="editar('${id}')">Editar</div>

    <div onclick="alterarStatus('${id}',${ativo})">
      ${ativo ? "Desativar" : "Ativar"}
    </div>

    <div class="danger" onclick="excluir('${id}')">Excluir</div>
  `;

  dropdown.style.display="block";

  let top=event.clientY;
  let left=event.clientX-150;

  if(left<10){
    left=10;
  }

  if(top+150>window.innerHeight){
    top=window.innerHeight-160;
  }

  dropdown.style.top=top+"px";
  dropdown.style.left=left+"px";

}

document.addEventListener("click",()=>{
  dropdown.style.display="none";
});

async function alterarStatus(id,ativo){

  dropdown.style.display="none";
  overlay.style.display="flex";

  const { error } = await sb
    .from("tipos_loja")
    .update({ ativo:!ativo })
    .eq("id",id);

  overlay.style.display="none";

  if(error){
    aviso("Erro ao alterar status");
    console.error(error);
    return;
  }

  aviso(ativo ? "Tipo desativado" : "Tipo ativado");

  load();

}

async function excluir(id){

  dropdown.style.display="none";

  const confirmar=confirm("Excluir este tipo?");

  if(!confirmar){
    return;
  }

  overlay.style.display="flex";

  const { error } = await sb
    .from("tipos_loja")
    .delete()
    .eq("id",id);

  overlay.style.display="none";

  if(error){
    aviso("Erro ao excluir");
    console.error(error);
    return;
  }

  aviso("Tipo excluído");

  load();

}

function render(){

  const busca=(f_busca.value||"").toLowerCase().trim();
  const status=f_status.value;

  let filtrados=tipos.filter(t=>{

    const texto=JSON.stringify(t||{}).toLowerCase();

    const passaBusca=!busca || texto.includes(busca);

    const passaStatus=!status || String(t.ativo===true)===status;

    return passaBusca && passaStatus;

  });

  if(!filtrados.length){

    lista.innerHTML=`
      <tr>
        <td colspan="6">
          <div class="empty">Nenhum tipo encontrado</div>
        </td>
      </tr>
    `;

    return;

  }

  lista.innerHTML=filtrados.map(t=>`

    <tr>
      <td>
        <div class="tipo-nome">${textoSeguro(t.nome || "-")}</div>
        <div class="tipo-sub">ID: ${textoSeguro(t.id || "-")}</div>
      </td>

      <td>${textoSeguro(t.slug || "-")}</td>

      <td>${textoSeguro(t.app_path || "-")}</td>

      <td>
        <span class="badge ${t.ativo ? "on" : "off"}">
          ${t.ativo ? "Ativo" : "Inativo"}
        </span>
      </td>

      <td>${formatarData(t.created_at)}</td>

      <td>
        <button
          class="menu-btn"
          onclick="abrirMenu(event,'${t.id}',${t.ativo})"
        >
          ⋮
        </button>
      </td>
    </tr>

  `).join("");

}

function formatarData(valor){

  if(!valor){
    return "-";
  }

  const data=new Date(valor);

  if(isNaN(data.getTime())){
    return "-";
  }

  return data.toLocaleDateString("pt-BR");

}

function textoSeguro(valor){

  if(valor===null || valor===undefined || valor===""){
    return '<span class="text-muted">-</span>';
  }

  return String(valor)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");

}

function aviso(msg){

  toast.innerText=msg;
  toast.style.display="block";

  clearTimeout(window.toastTimer);

  window.toastTimer=setTimeout(()=>{
    toast.style.display="none";
  },2500);

}

document.addEventListener("keydown",(e)=>{

  if(e.key==="Escape"){
    fecharModal();
    dropdown.style.display="none";
  }

});

load();
</script>

</body>
</html>
