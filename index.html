<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<title>CLENA • Painel Administrativo</title>

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#2563eb">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link rel="manifest" href="manifest.json">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

<style>
:root{
  --primary:#2563eb;
  --primary-dark:#1d4ed8;
  --primary-soft:#eff6ff;

  --bg:#f3f6fb;
  --surface:#ffffff;
  --surface-soft:#f8fafc;

  --text:#0f172a;
  --muted:#64748b;
  --muted-light:#94a3b8;

  --border:#e2e8f0;
  --border-soft:#edf2f7;

  --danger:#dc2626;
  --success:#16a34a;

  --sidebar-width:280px;

  --radius-sm:12px;
  --radius-md:16px;
  --radius-lg:22px;

  --shadow-sm:0 6px 18px rgba(15,23,42,.06);
  --shadow-md:0 16px 40px rgba(15,23,42,.10);
}

*{
  box-sizing:border-box;
  font-family:Inter,Arial,sans-serif;
  -webkit-tap-highlight-color:transparent;
}

html,
body{
  width:100%;
  height:100%;
  margin:0;
  background:var(--bg);
  color:var(--text);
  overflow:hidden;
}

body{
  font-size:14px;
}

button{
  font-family:inherit;
}

.app{
  width:100%;
  height:100vh;
  display:grid;
  grid-template-columns:var(--sidebar-width) 1fr;
  background:var(--bg);
}

/* SIDEBAR */
.sidebar{
  height:100vh;
  background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  z-index:50;
}

/* LOGO */
.brand{
  height:76px;
  padding:16px;
  display:flex;
  align-items:center;
  gap:12px;
  border-bottom:1px solid var(--border-soft);
}

.brand-icon{
  width:44px;
  height:44px;
  min-width:44px;
  border-radius:16px;
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  display:grid;
  place-items:center;
  color:#fff;
  font-size:22px;
  box-shadow:0 10px 24px rgba(37,99,235,.25);
  overflow:hidden;
}

.brand-icon img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.brand-text{
  min-width:0;
}

.brand-title{
  font-size:18px;
  font-weight:900;
  line-height:1;
  letter-spacing:.2px;
}

.brand-subtitle{
  margin-top:5px;
  font-size:11px;
  color:var(--muted);
  font-weight:700;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

/* MENU */
.menu{
  flex:1;
  min-height:0;
  overflow-y:auto;
  padding:14px 12px;
}

.menu::-webkit-scrollbar{
  width:5px;
}

.menu::-webkit-scrollbar-thumb{
  background:#cbd5e1;
  border-radius:999px;
}

.menu-section{
  margin-bottom:18px;
}

.menu-section-title{
  margin:0 0 7px;
  padding:0 10px;
  font-size:10px;
  font-weight:900;
  color:var(--muted-light);
  text-transform:uppercase;
  letter-spacing:.7px;
}

.nav-item{
  width:100%;
  min-height:44px;
  border:0;
  outline:0;
  background:transparent;
  color:#334155;
  border-radius:14px;
  padding:10px 12px;
  display:flex;
  align-items:center;
  gap:11px;
  cursor:pointer;
  text-align:left;
  font-size:14px;
  font-weight:800;
  transition:.18s ease;
}

.nav-item i{
  width:22px;
  min-width:22px;
  height:22px;
  display:grid;
  place-items:center;
  font-size:19px;
  color:#64748b;
  transition:.18s ease;
}

.nav-item span{
  flex:1;
  min-width:0;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.nav-item:hover{
  background:var(--primary-soft);
  color:var(--primary);
}

.nav-item:hover i{
  color:var(--primary);
}

.nav-item.active{
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  color:#fff;
  box-shadow:0 12px 24px rgba(37,99,235,.25);
}

.nav-item.active i{
  color:#fff;
}

.nav-arrow{
  width:auto !important;
  min-width:auto !important;
  color:#94a3b8 !important;
  font-size:17px !important;
  transition:.18s ease;
}

.nav-item.active .nav-arrow{
  color:#fff !important;
}

.nav-item.open .nav-arrow{
  transform:rotate(180deg);
}

.submenu{
  display:none;
  padding:6px 0 4px 34px;
}

.nav-item.open + .submenu{
  display:block;
}

.submenu .nav-item{
  min-height:38px;
  padding:9px 11px;
  font-size:13px;
  font-weight:800;
  border-radius:12px;
  color:#475569;
}

.submenu .nav-item i{
  font-size:17px;
}

.submenu .nav-item.active{
  color:#fff;
}

/* SIDEBAR FOOTER */
.sidebar-footer{
  padding:14px;
  border-top:1px solid var(--border-soft);
}

.status-card{
  border:1px solid var(--border);
  background:var(--surface-soft);
  border-radius:18px;
  padding:13px;
  display:flex;
  align-items:center;
  gap:10px;
}

.status-dot{
  width:10px;
  height:10px;
  border-radius:999px;
  background:var(--success);
  box-shadow:0 0 0 5px rgba(22,163,74,.12);
}

.status-text{
  min-width:0;
}

.status-title{
  font-size:13px;
  font-weight:900;
  line-height:1.1;
}

.status-subtitle{
  margin-top:4px;
  font-size:11px;
  color:var(--muted);
  font-weight:700;
}

/* CONTENT */
.content{
  min-width:0;
  height:100vh;
  display:flex;
  flex-direction:column;
  background:var(--bg);
}

/* TOPBAR */
.topbar{
  height:76px;
  background:rgba(255,255,255,.92);
  backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
  padding:0 22px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
}

.top-left{
  min-width:0;
  display:flex;
  align-items:center;
  gap:14px;
}

.menu-toggle{
  width:42px;
  height:42px;
  border:0;
  border-radius:14px;
  background:#eef2f7;
  color:var(--text);
  display:none;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  font-size:22px;
  transition:.18s ease;
}

.menu-toggle:hover{
  background:var(--primary-soft);
  color:var(--primary);
}

.page-info{
  min-width:0;
}

.page-title{
  font-size:20px;
  font-weight:900;
  line-height:1.1;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.page-subtitle{
  margin-top:5px;
  font-size:12px;
  color:var(--muted);
  font-weight:700;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.top-actions{
  display:flex;
  align-items:center;
  gap:10px;
}

.action-btn{
  height:42px;
  border:0;
  border-radius:14px;
  padding:0 14px;
  background:#eef2f7;
  color:#0f172a;
  display:flex;
  align-items:center;
  gap:8px;
  cursor:pointer;
  font-size:13px;
  font-weight:900;
  transition:.18s ease;
}

.action-btn i{
  font-size:18px;
}

.action-btn:hover{
  background:var(--primary-soft);
  color:var(--primary);
}

.action-btn.primary{
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  color:#fff;
  box-shadow:0 12px 24px rgba(37,99,235,.22);
}

.action-btn.primary:hover{
  color:#fff;
  filter:brightness(.98);
}

/* FRAME */
.frame-area{
  flex:1;
  min-height:0;
  padding:16px;
}

.frame-card{
  width:100%;
  height:100%;
  background:#fff;
  border:1px solid var(--border);
  border-radius:24px;
  box-shadow:var(--shadow-sm);
  overflow:hidden;
}

iframe{
  width:100%;
  height:100%;
  border:0;
  display:block;
  background:#fff;
}

/* MOBILE OVERLAY */
.mobile-overlay{
  position:fixed;
  inset:0;
  background:rgba(15,23,42,.48);
  backdrop-filter:blur(3px);
  display:none;
  z-index:40;
}

/* TABLET / MOBILE */
@media(max-width:1024px){

  .app{
    grid-template-columns:1fr;
  }

  .sidebar{
    position:fixed;
    top:0;
    left:0;
    width:var(--sidebar-width);
    max-width:86vw;
    transform:translateX(-105%);
    transition:.25s ease;
    box-shadow:24px 0 55px rgba(15,23,42,.28);
  }

  .sidebar.open{
    transform:translateX(0);
  }

  .mobile-overlay.show{
    display:block;
  }

  .menu-toggle{
    display:flex;
  }

  .topbar{
    padding:0 14px;
  }

  .frame-area{
    padding:10px;
  }

  .frame-card{
    border-radius:20px;
  }

}

/* CELULAR */
@media(max-width:640px){

  .topbar{
    height:68px;
  }

  .brand{
    height:68px;
  }

  .page-title{
    font-size:16px;
  }

  .page-subtitle{
    font-size:11px;
  }

  .action-btn span{
    display:none;
  }

  .action-btn{
    width:42px;
    padding:0;
    justify-content:center;
  }

  .frame-area{
    padding:8px;
  }

  .frame-card{
    border-radius:18px;
  }

}
</style>
</head>

<body>

<div class="mobile-overlay" id="mobileOverlay" onclick="closeSidebar()"></div>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">

    <div class="brand">
      <div class="brand-icon">
        <img src="icons/icon-192.png" onerror="this.remove(); this.parentElement.innerHTML='<i class=&quot;ri-shield-star-line&quot;></i>';">
      </div>

      <div class="brand-text">
        <div class="brand-title">CLENA</div>
        <div class="brand-subtitle">Painel administrativo</div>
      </div>
    </div>

    <nav class="menu">

      <div class="menu-section">
        <p class="menu-section-title">Principal</p>

        <button class="nav-item active" onclick="openPage('admin-customizacoes.html','Palavras-chave','Configurações de customizações',this)">
          <i class="ri-key-2-line"></i>
          <span>Palavras-chave</span>
        </button>

        <button class="nav-item" onclick="openPage('profile.html','Lojas','Gerenciamento das lojas cadastradas',this)">
          <i class="ri-store-2-line"></i>
          <span>Lojas</span>
        </button>

        <button class="nav-item" onclick="openPage('admin-agendamentos.html','Agendamentos','Painel global de agendamentos',this)">
          <i class="ri-calendar-check-line"></i>
          <span>Agendamentos</span>
        </button>
      </div>

      <div class="menu-section">
        <p class="menu-section-title">Configurações</p>

        <button class="nav-item" onclick="openPage('painel-tipo-loja.html','Tipos e APP','Cadastro e configuração dos tipos de loja',this)">
          <i class="ri-apps-2-line"></i>
          <span>Tipos e APP</span>
        </button>
      </div>

      <div class="menu-section">
        <p class="menu-section-title">Relatórios</p>

        <button class="nav-item has-sub" onclick="toggleMenu(this)">
          <i class="ri-bar-chart-line"></i>
          <span>Relatórios</span>
          <i class="ri-arrow-down-s-line nav-arrow"></i>
        </button>

        <div class="submenu">
          <button class="nav-item" onclick="openPage('admin-relatorios-vendas.html','Relatório de Vendas','Acompanhamento de vendas por período',this)">
            <i class="ri-line-chart-line"></i>
            <span>Vendas</span>
          </button>

          <button class="nav-item" onclick="openPage('admin-relatorios-uso.html','Uso de Customizações','Relatório de uso das customizações',this)">
            <i class="ri-file-chart-line"></i>
            <span>Uso de customizações</span>
          </button>
        </div>
      </div>

    </nav>

    <div class="sidebar-footer">
      <div class="status-card">
        <div class="status-dot"></div>
        <div class="status-text">
          <div class="status-title">Sistema ativo</div>
          <div class="status-subtitle">Navegue pelo menu lateral.</div>
        </div>
      </div>
    </div>

  </aside>

  <!-- CONTEÚDO -->
  <main class="content">

    <header class="topbar">

      <div class="top-left">
        <button class="menu-toggle" onclick="toggleSidebar()" aria-label="Abrir menu">
          <i class="ri-menu-line"></i>
        </button>

        <div class="page-info">
          <div class="page-title" id="pageTitle">Palavras-chave</div>
          <div class="page-subtitle" id="pageSubtitle">Configurações de customizações</div>
        </div>
      </div>

      <div class="top-actions">
        <button class="action-btn" onclick="reloadFrame()" title="Atualizar página">
          <i class="ri-refresh-line"></i>
          <span>Atualizar</span>
        </button>

        <button class="action-btn primary" onclick="openCurrentNewTab()" title="Abrir em nova aba">
          <i class="ri-external-link-line"></i>
          <span>Abrir</span>
        </button>
      </div>

    </header>

    <section class="frame-area">
      <div class="frame-card">
        <iframe id="frame" src="admin-customizacoes.html"></iframe>
      </div>
    </section>

  </main>

</div>

<script>
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js").catch(()=>{});
}

const sidebar = document.getElementById("sidebar");
const mobileOverlay = document.getElementById("mobileOverlay");
const frame = document.getElementById("frame");
const pageTitle = document.getElementById("pageTitle");
const pageSubtitle = document.getElementById("pageSubtitle");

function openPage(page, title, subtitle, el){

  frame.src = page;

  pageTitle.innerText = title || "CLENA";
  pageSubtitle.innerText = subtitle || "Painel administrativo";

  document.querySelectorAll(".nav-item").forEach(item=>{
    item.classList.remove("active");
  });

  if(el){
    el.classList.add("active");
  }

  closeSidebar();
}

function toggleMenu(el){

  const isOpen = el.classList.contains("open");

  document.querySelectorAll(".nav-item.has-sub").forEach(item=>{
    item.classList.remove("open");
  });

  if(!isOpen){
    el.classList.add("open");
  }
}

function toggleSidebar(){

  sidebar.classList.toggle("open");

  if(sidebar.classList.contains("open")){
    mobileOverlay.classList.add("show");
  }else{
    mobileOverlay.classList.remove("show");
  }
}

function closeSidebar(){
  sidebar.classList.remove("open");
  mobileOverlay.classList.remove("show");
}

function reloadFrame(){

  try{
    frame.contentWindow.location.reload();
  }catch(e){
    frame.src = frame.src;
  }

}

function openCurrentNewTab(){
  window.open(frame.src, "_blank");
}

document.addEventListener("keydown", function(e){
  if(e.key === "Escape"){
    closeSidebar();
  }
});
</script>

</body>
</html>
