<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>Painel Administrativo</title>

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

<style>
:root{
  --primary:#2563eb;
  --dark:#020617;
  --bg:#f4f6fb;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --border:#e5e7eb;
  --radius:18px;
  --shadow:0 16px 40px rgba(2,6,23,.25);
}

*{box-sizing:border-box;font-family:Inter,system-ui}
html,body{height:100%;margin:0;background:var(--bg);overflow:hidden}

/* APP */
.app{height:100vh;display:flex;flex-direction:column;max-width:100vw}

/* HEADER */
.header{
  height:58px;
  background:linear-gradient(180deg,#0f172a,#020617);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:900;
  letter-spacing:.4px;
}

/* CONTENT */
.content{flex:1;position:relative;background:#fff;overflow:hidden}
iframe{width:100%;height:100%;border:none}

/* LOADING OVERLAY */
.loading{
  position:absolute;
  inset:0;
  background:rgba(2,6,23,.85);
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-weight:900;
  letter-spacing:1px;
  z-index:20;
  opacity:0;
  pointer-events:none;
  transition:.2s;
}
.loading.show{opacity:1;pointer-events:auto}

/* BOTTOM NAV */
.bottom-nav{
  height:76px;
  background:#020617;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  padding-bottom:env(safe-area-inset-bottom);
  box-shadow:0 -10px 30px rgba(2,6,23,.6);
  z-index:9;
}

.nav-item{
  position:relative;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:4px;
  color:#94a3b8;
  font-size:11px;
  font-weight:800;
  cursor:pointer;
  transition:.15s;
}

.nav-item i{font-size:22px}
.nav-item.active{color:#fff;transform:translateY(-2px)}
.nav-item:active{transform:scale(.94)}

/* BADGE */
.badge{
  position:absolute;
  top:8px;
  right:22px;
  background:#ef4444;
  color:#fff;
  font-size:10px;
  font-weight:900;
  padding:2px 6px;
  border-radius:999px;
}

/* FLOAT BUTTON */
.fab{
  position:absolute;
  bottom:90px;
  right:16px;
  width:58px;
  height:58px;
  border-radius:50%;
  background:linear-gradient(135deg,#2563eb,#60a5fa);
  box-shadow:var(--shadow);
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-size:28px;
  cursor:pointer;
  z-index:10;
  transition:.2s;
}
.fab:active{transform:scale(.92)}

/* QUICK MENU */
.quick-menu{
  position:absolute;
  bottom:156px;
  right:16px;
  background:#020617;
  border-radius:16px;
  box-shadow:var(--shadow);
  padding:8px;
  display:none;
  flex-direction:column;
  gap:6px;
  z-index:11;
}
.quick-menu.open{display:flex}
.quick-menu button{
  background:#0f172a;
  border:none;
  color:#fff;
  padding:12px 14px;
  border-radius:12px;
  font-weight:700;
  display:flex;
  align-items:center;
  gap:8px;
  cursor:pointer;
}
.quick-menu button:active{transform:scale(.96)}
</style>
</head>

<body>

<div class="app">

  <div class="header">Painel Administrativo</div>

  <div class="content">
    <iframe id="frame" src="admin-customizacoes.html" onload="hideLoading()"></iframe>

    <div class="loading" id="loading">CARREGANDO…</div>

    <div class="fab" onclick="toggleQuick()">
      <i class="ri-add-line"></i>
    </div>

    <div class="quick-menu" id="quickMenu">
      <button onclick="openPage(null,'admin-customizacoes.html')"><i class="ri-settings-3-line"></i> Customizações</button>
      <button onclick="openPage(null,'profile.html')"><i class="ri-store-2-line"></i> Lojas</button>
      <button onclick="openPage(null,'admin-relatorios-vendas.html')"><i class="ri-bar-chart-line"></i> Relatórios</button>
    </div>
  </div>

  <nav class="bottom-nav">
    <div class="nav-item active" onclick="openPage(this,'admin-customizacoes.html')">
      <i class="ri-settings-3-line"></i><span>Customizar</span>
    </div>
    <div class="nav-item" onclick="openPage(this,'painel-tipo-loja.html')">
      <i class="ri-apps-2-line"></i><span>Tipos</span>
    </div>
    <div class="nav-item" onclick="openPage(this,'profile.html')">
      <i class="ri-store-2-line"></i><span>Lojas</span><div class="badge">3</div>
    </div>
    <div class="nav-item" onclick="openPage(this,'admin-relatorios-vendas.html')">
      <i class="ri-bar-chart-line"></i><span>Relatórios</span>
    </div>
  </nav>

</div>

<script>
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js");
}

function showLoading(){
  document.getElementById("loading").classList.add("show");
}
function hideLoading(){
  document.getElementById("loading").classList.remove("show");
}

function openPage(el, page){
  showLoading();
  if(el){
    document.querySelectorAll(".nav-item").forEach(i=>i.classList.remove("active"));
    el.classList.add("active");
  }
  document.getElementById("frame").src = page;
  document.getElementById("quickMenu").classList.remove("open");
}

function toggleQuick(){
  document.getElementById("quickMenu").classList.toggle("open");
}
</script>

</body>
</html>
