<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>Painel Administrativo</title>

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#111827">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

<style>
:root{
  --primary:#2563eb;
  --bg:#f3f4f6;
  --dark:#111827;
  --text:#111827;
  --muted:#9ca3af;
  --radius:18px;
}

*{
  box-sizing:border-box;
  font-family:Inter,system-ui;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  height:100%;
  margin:0;
  background:var(--bg);
  overflow:hidden;
}

/* APP CONTAINER */
.app{
  height:100dvh;
  display:flex;
  flex-direction:column;
  max-width:100vw;
  overflow:hidden;
}

/* HEADER */
.header{
  height:60px;
  background:#111827;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:800;
  font-size:16px;
  letter-spacing:.5px;
  flex-shrink:0;
}

/* CONTENT */
.content{
  flex:1;
  position:relative;
  background:#fff;
  overflow:hidden;
}

iframe{
  width:100%;
  height:100%;
  border:none;
}

/* NAVBAR */
.bottom-nav{
  position:relative;
  flex-shrink:0;
  height:78px;
  padding-bottom:env(safe-area-inset-bottom);
  background:rgba(17,24,39,0.98);
  backdrop-filter:blur(20px);
  display:flex;
  align-items:center;
  justify-content:space-around;
  box-shadow:0 -4px 25px rgba(0,0,0,.2);
}

.nav-item{
  flex:1;
  height:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:4px;
  color:#9ca3af;
  font-size:11px;
  font-weight:700;
  cursor:pointer;
  transition:.2s ease;
}

.nav-item i{
  font-size:22px;
}

.nav-item.active{
  color:#fff;
}

.nav-item.active i{
  transform:translateY(-2px);
}

.nav-item:active{
  transform:scale(.95);
}

/* LOADING */
.loading{
  position:absolute;
  inset:0;
  background:rgba(17,24,39,.9);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:800;
  letter-spacing:1px;
  opacity:0;
  pointer-events:none;
  transition:.2s;
}

.loading.show{
  opacity:1;
  pointer-events:auto;
}
</style>
</head>

<body>

<div class="app">

  <div class="header">
    Painel Administrativo
  </div>

  <div class="content">
    <iframe id="frame" src="admin-customizacoes.html" onload="hideLoading()"></iframe>
    <div class="loading" id="loading">CARREGANDO...</div>
  </div>

  <nav class="bottom-nav">

    <div class="nav-item active" onclick="openPage(this,'admin-customizacoes.html')">
      <i class="ri-settings-3-line"></i>
      <span>Customizar</span>
    </div>

    <div class="nav-item" onclick="openPage(this,'painel-tipo-loja.html')">
      <i class="ri-apps-2-line"></i>
      <span>Tipos</span>
    </div>

    <div class="nav-item" onclick="openPage(this,'profile.html')">
      <i class="ri-store-2-line"></i>
      <span>Lojas</span>
    </div>

    <div class="nav-item" onclick="openPage(this,'admin-relatorios-vendas.html')">
      <i class="ri-bar-chart-line"></i>
      <span>Relatórios</span>
    </div>

  </nav>

</div>

<script>
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js");
}

function showLoading(){
  document.getElementById("loading").classList.add("show");
}

function hideLoading(){
  document.getElementById("loading").classList.remove("show");
}

function openPage(el,page){
  showLoading();
  document.querySelectorAll(".nav-item").forEach(i=>i.classList.remove("active"));
  el.classList.add("active");
  document.getElementById("frame").src = page;
}
</script>

</body>
</html>
