<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>Painel Administrativo</title>

<meta name="viewport"
      content="width=device-width,
               initial-scale=1,
               maximum-scale=1,
               user-scalable=no,
               viewport-fit=cover">

<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link rel="manifest" href="manifest.json">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

<style>
:root{
  --primary:#2563eb;
  --dark:#020617;
  --bg:#f4f6fb;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --border:#e5e7eb;
  --radius:18px;
}

*{
  box-sizing:border-box;
  font-family:Inter,system-ui;
}

html,body{
  height:100%;
  margin:0;
  background:var(--bg);
  overflow:hidden;
}

/* APP */
.app{
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* HEADER */
.header{
  height:56px;
  background:#fff;
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:900;
  font-size:16px;
}

/* CONTEÚDO */
.content{
  flex:1;
  position:relative;
  background:#fff;
}

iframe{
  width:100%;
  height:100%;
  border:none;
}

/* BOTTOM NAV */
.bottom-nav{
  height:72px;
  background:#0f172a;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  padding-bottom:env(safe-area-inset-bottom);
}

.nav-item{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:4px;
  color:#cbd5f5;
  font-size:11px;
  font-weight:700;
  cursor:pointer;
  transition:.15s;
}

.nav-item i{
  font-size:22px;
}

.nav-item.active{
  color:#fff;
}

.nav-item:active{
  transform:scale(.95);
}
</style>
</head>

<body>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    Painel Administrativo
  </div>

  <!-- CONTEÚDO -->
  <div class="content">
    <iframe id="frame" src="admin-customizacoes.html"></iframe>
  </div>

  <!-- NAVBAR INFERIOR -->
  <nav class="bottom-nav">

    <div class="nav-item active" onclick="openPage(this,'admin-customizacoes.html')">
      <i class="ri-settings-3-line"></i>
      <span>Customizar</span>
    </div>

    <div class="nav-item" onclick="openPage(this,'painel-tipo-loja.html')">
      <i class="ri-apps-2-line"></i>
      <span>Tipos</span>
    </div>

    <div class="nav-item" onclick="openPage(this,'profile.html')">
      <i class="ri-store-2-line"></i>
      <span>Lojas</span>
    </div>

    <div class="nav-item" onclick="openPage(this,'admin-relatorios-vendas.html')">
      <i class="ri-bar-chart-line"></i>
      <span>Relatórios</span>
    </div>

  </nav>

</div>

<script>
/* ===== PWA ===== */
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js");
}

/* ===== NAVEGAÇÃO ===== */
function openPage(el, page){
  document.querySelectorAll(".nav-item").forEach(i=>i.classList.remove("active"));
  el.classList.add("active");
  document.getElementById("frame").src = page;
}
</script>

</body>
</html>
